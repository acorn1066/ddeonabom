<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<style>
	.overflow-hidden{cursor: pointer;}
</style>
<body>
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	<main class="mx-auto max-w-wide px-6">
	  <div class="pb-6 pt-12">
	    <span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">관광지 탐색</span>
	    <h1 class="my-2 text-h2 font-extrabold tracking-tight">어디로 떠나볼까요</h1>
	    <p class="text-15 text-muted">전국 [[${pi.listCount}]]개 관광지에서 가고 싶은 곳을 찜하고, 일정에 담아보세요.</p>
	  </div>
	
	  <div class="my-5 flex gap-3">
	    <div class="relative flex-1">
	      <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-faint" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="5.5"/><path d="M12.5 12.5L16 16"/></svg>
	      <input class="h-13 w-full rounded-xl border border-line bg-white pl-12 pr-6 text-15 outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" placeholder="관광지, 지역을 검색하세요" />
	    </div>
	    <button class="inline-flex h-13 items-center rounded-xl bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">검색</button>
	  </div>
	
	  <div class="flex flex-wrap items-center gap-2 border-b border-line pb-5">
	    <div class="flex gap-1.5">
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white">전체 지역</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">서울</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">부산</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">제주</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">강원</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">경상</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">전라</span>
	    </div>
	    <span class="mx-1.5 h-6 w-px bg-line"></span>
	    <div class="flex gap-1.5">
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">관광지</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">문화시설</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">축제/공연/행사</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">여행코스</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">레포츠</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">숙박</span>
	      <span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">쇼핑</span>
	    </div>
	    <div class="ml-auto">
	      <select class="h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none"><option>추천순</option><option>조회순</option><option>후기 많은 순</option><option>평점 높은 순</option></select>
	    </div>
	  </div>
	
	  <div class="flex items-center justify-between py-5">
	    <div class="text-sm text-muted">총 <b class="font-bold text-ink tabular-nums">[[${pi.listCount}]]</b>개 관광지</div>
	  </div>
	
	  <div class="grid grid-cols-4 gap-5 pb-7" >
	    <div th:each="l:${list}" class="overflow-hidden rounded-xl border border-line bg-white shadow-soft transition hover:-translate-y-1 hover:shadow-card">
	      <div class="relative aspect-card">
	      <th:block th:if="${l.firstimage != null and !#strings.isEmpty(l.firstimage)}">
	        <img class="absolute inset-0 h-full w-full object-cover flex items-center justify-center bg-sunk" th:src="${l.firstimage}"/>
	      </th:block>
	      <th:block th:unless="${l.firstimage != null and !#strings.isEmpty(l.firstimage)}">
	      	<div class="absolute inset-0 flex items-center justify-center bg-sunk"><span class="rounded-full bg-white/70 px-2.5 py-1 text-xs font-medium text-muted">[[${l.title}]]</span></div>
	      </th:block>
	        <span class="absolute right-2.5 top-2.5 flex h-9 w-9 items-center justify-center rounded-full bg-white/90 shadow-soft text-brand"><svg width="17" height="17" viewBox="0 0 18 18" fill="currentColor" stroke="currentColor" stroke-width="1.5"><path d="M9 15.5S2.5 11 2.5 6.5A3.5 3.5 0 0 1 9 4a3.5 3.5 0 0 1 6.5 2.5C15.5 11 9 15.5 9 15.5Z"/></svg></span>
	        <span class="absolute bottom-2.5> left-2.5 inline-flex h-7 items-center rounded-full bg-ink px-3 text-xs font-medium text-white">[[${contentType[l.contentTypeId]}]]</span>
	      </div>
	      <div class="px-0.5 pb-1 pt-3" >
	        <div class="text-base font-bold">[[${l.title}]]</div>
	        <div class="mt-1 flex items-center justify-between">
	        <th:block th:if="${l.addr1 != null and !#strings.isEmpty(l.addr1)}">
	          <span class="text-13 text-muted">
	          [[${l.addr1}]]</span>
	        </th:block>
	          <div class="id" style="display: none">[[${l.contentId}]]</div>
	          <span class="flex items-center gap-1 text-13 font-semibold"><span class="text-brand">★</span><span class="tabular-nums">4.6</span></span>
	        </div>
	      </div>
	    </div>
	  </div>
		<!-- 페이징 처리 -->
	  <div class="flex justify-center gap-1 py-6">
	  
	  	<a th:if="${pi.currentPage > 1}"
	  		th:href="@{${loc}(page=1)}"
	  		class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">
	  	‹‹
	  	</a>
	  	
	  	<a th:if="${pi.currentPage > 1}"
	  		th:href="@{${loc}(page=${pi.currentPage - 1})}"
	  		class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">
	  	‹	
	  	</a>
	  	
	  	<th:block th:each="p: ${#numbers.sequence(pi.startPage, pi.endPage)}">
		  	<span th:if="${p == pi.currentPage}"
		  			class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg bg-brand px-2 text-sm font-medium text-white">
		  	[[${p}]]
		  	</span>
		  	<a th:unless="${p == pi.currentPage}"
		  		th:href="@{${loc}(page=${p})}"
		  		class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">
		  	[[${p}]]
		  	</a>
	  	</th:block>
	  	
	  	<a th:if="${pi.currentPage < pi.maxPage}"
	  		th:href="@{${loc}(page=${pi.currentPage + 1})}"
	  		class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">
	  	›	
	  	</a>
	  	
	  	<a th:if="${pi.currentPage < pi.maxPage}"
	  		th:href="@{${loc}(page=${pi.maxPage})}"
	  		class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">
	  	››	
	  	</a>
	  </div>
		
	</main>
	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
	
	<script th:inline="javascript">
		window.onload = () => {
			const lists = document.querySelectorAll('.overflow-hidden');
			for(list of lists) {
// 				console.log(list);
				list.addEventListener('click', (e) => {
					console.log(e.target);
					const div = e.target.closest('.overflow-hidden');
					console.log(div);
					const contentId = div.querySelector('.overflow-hidden .id').innerText
					console.log(contentId);
					location.href = '/landmark/' + contentId + "/" + /*[[${pi.currentPage}]]*/0;
				});
			}
		}
	</script>
</body>
</html>
