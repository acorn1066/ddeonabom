<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body class="bg-white text-ink">

<div th:replace="~{views/common/navbar :: navbar}"></div>
<div th:replace="~{views/common/modal :: modal}"></div>

<!-- ════════════ MAIN ════════════ -->
<main class="mx-auto max-w-3xl px-6 pb-24 pt-16">
  <h1 class="mb-2 text-3xl font-extrabold tracking-tight">여행 후기 작성</h1>
  <p class="mb-12 text-15 text-muted">한 번의 여행에서 들른 관광지들의 후기를 모아 한 편의 글로 남겨보세요.</p>

  <form id="reviewForm" action="/reviews/insert" method="post" enctype="multipart/form-data">
    <!-- 1. 여행 정보 -->
    <div class="mb-5 rounded-xl border border-line bg-white p-6 shadow-soft">
      <h2 class="mb-5 flex items-center gap-2 text-base font-bold">
        <span class="flex h-6 w-6 items-center justify-center rounded-full bg-brand text-13 font-bold text-white">1</span>
        여행 정보
      </h2>
      <div class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-13 font-semibold">여행 제목</label>
		 <input id="travelTitle" name="travelTitle" th:value="${travel != null ? travel.travelTitle : ''}" class="h-13 rounded-lg border border-line bg-white px-4 text-17 font-semibold outline-none transition placeholder:font-normal placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" placeholder="예) 제주 동쪽 3박 4일" />
		        </div>
		        <div class="flex flex-col gap-2">
				  <label class="text-13 font-semibold">지역</label>
				  <select name="region" id="region"
				    class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-brand-soft">
				    <option value="">지역 선택</option>
				    <option value="서울">서울</option>
				    <option value="부산">부산</option>
				    <option value="대구">대구</option>
				    <option value="인천">인천</option>
				    <option value="광주">광주</option>
				    <option value="대전">대전</option>
				    <option value="울산">울산</option>
				    <option value="세종">세종</option>
				    <option value="경기도">경기도</option>
				    <option value="강원">강원</option>
				    <option value="충북">충북</option>
				    <option value="충남">충남</option>
				    <option value="전북">전북</option>
				    <option value="전남">전남</option>
				    <option value="경북">경북</option>
				    <option value="경남">경남</option>
				    <option value="제주">제주</option>
				    
		
				  </select>
				</div>
		        <div class="grid grid-cols-2 gap-4">
		          <div class="flex flex-col gap-2">
		            <label class="text-13 font-semibold">여행 시작일</label>
		<input type="date" id="startDate" name="travelStartDate" class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-brand-soft" />
		          </div>
		          <div class="flex flex-col gap-2">
		            <label class="text-13 font-semibold">여행 종료일</label>
		<input type="date" id="endDate" name="travelEndDate" class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-brand-soft" />
		          </div>
		        </div>

        <!-- 지도 검색 + 지도 -->
        <div class="flex flex-col gap-2">
          <label class="text-13 font-semibold">동선 지도</label>
          <p class="text-xs text-muted">장소를 검색해서 지도에 추가하면 관광지 카드가 자동으로 생성됩니다.</p>

          <!-- 검색창 -->
          <div class="flex gap-2">
            <input id="mapSearchInput" type="text"
              class="h-10 flex-1 rounded-lg border border-line bg-white px-4 text-sm outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft"
              placeholder="관광지 이름으로 검색 (예: 성산일출봉)" />
            <button type="button" id="mapSearchBtn"
              class="h-10 rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">
              검색
            </button>
          </div>

          <!-- 검색 결과 목록 -->
          <ul id="mapSearchResults" class="hidden flex-col gap-1 rounded-lg border border-line bg-white p-2 text-sm shadow-soft"></ul>

          <!-- 카카오맵 -->
          <div id="map" class="h-80 overflow-hidden rounded-lg border border-line"></div>
        </div>
      </div>
    </div>

    <!-- 2. 관광지별 후기 -->
    <div class="mb-5 rounded-xl border border-line bg-white p-6 shadow-soft">
	  <h2 class="mb-5 flex items-center gap-2 text-base font-bold">
	    <span class="flex h-6 w-6 items-center justify-center rounded-full bg-brand text-13 font-bold text-white">2</span>
	    관광지별 후기
	  </h2>
	  <div id="spotList" class="flex flex-col gap-4">
	    <p id="spotEmpty" class="py-6 text-center text-sm text-muted">지도에서 장소를 추가하거나 아래 버튼을 눌러 직접 입력하세요.</p>
	  </div>
	  <button type="button" id="addSpotBtn"
	    class="mt-4 flex h-14 w-full items-center justify-center gap-2 rounded-xl border-2 border-dashed border-line bg-sunk text-sm font-bold text-muted transition hover:border-brand hover:bg-brand-soft hover:text-brand">
	    <span class="text-lg">＋</span> 관광지 직접 추가
	  </button>
	</div>

    <!-- 3. 공개 설정 -->
    <div class="mb-5 rounded-xl border border-line bg-white p-6 shadow-soft">
      <h2 class="mb-5 flex items-center gap-2 text-base font-bold">
        <span class="flex h-6 w-6 items-center justify-center rounded-full bg-brand text-13 font-bold text-white">3</span>
        공개 설정
      </h2>
      <div id="visibility-group" class="flex flex-col gap-3">
	    <label class="flex items-center gap-2.5 text-sm text-muted">
	        <input type="radio" name="visibility" value="PUBLIC" class="accent-brand" checked />
	        <span><b class="text-ink">전체 공개</b> · 누구나 볼 수 있고 관광지 상세에 후기가 노출됩니다</span>
	    </label>
	    <label class="flex items-center gap-2.5 text-sm text-muted">
	        <input type="radio" name="visibility" value="MEMBER" class="accent-brand" />
	        <span><b class="text-ink">회원 공개</b> · 로그인한 떠나봄 회원만 볼 수 있습니다</span>
	    </label>
	  </div>
    </div>

    <div class="flex justify-end gap-2">
      <a href="list" class="inline-flex h-11 items-center rounded-lg border border-line bg-white px-5 text-sm font-semibold text-ink transition hover:bg-sunk">취소</a>
      <button type="button" id="submitBtn" class="inline-flex h-11 items-center rounded-lg border border-line bg-white px-5 text-sm font-semibold text-ink transition hover:bg-sunk">후기 등록</button>
    </div>
  </form>
</main>

<footer th:replace="~{views/common/footer :: footer}"></footer>

<script th:inline="javascript">

// ════════════════════════════════════════
//  카카오맵 초기화
// ════════════════════════════════════════


kakao.maps.load(function () {
	const map = new kakao.maps.Map(document.getElementById('map'), {
	  center: new kakao.maps.LatLng(33.3617, 126.5292), // 제주도 중심
	  level: 10
	});
	
	const markers = [];
	const polylines = [];
	const polyline = new kakao.maps.Polyline({
	  map,
	  path: [],
	  strokeWeight: 2.5,
	  strokeColor: '#1F47E6',
	  strokeOpacity: 0.9,
	  strokeStyle: 'solid'
	});
	
	function updatePolyline() {
	    polylines.forEach(p => p.setMap(null));
	    polylines.length = 0;
	    polyline.setPath([]); // 직선도 초기화

	    if (markers.length < 2) return;

	    const points = markers.map(m => ({
	        lat: m.getPosition().getLat(),
	        lng: m.getPosition().getLng()
	    }));

	    drawRoadPath(points);
	}
	function fitBounds() {
	    if (markers.length === 0) return;
	    const bounds = new kakao.maps.LatLngBounds();
	    markers.forEach(m => bounds.extend(m.getPosition()));
	    map.setBounds(bounds);
	}
	async function drawRoadPath(points) {
	    const MAX_POINTS_PER_CALL = 7;
	    const segments = [];
	    for (let i = 0; i < points.length - 1; i += (MAX_POINTS_PER_CALL - 1)) {
	        const slice = points.slice(i, i + MAX_POINTS_PER_CALL);
	        if (slice.length >= 2) segments.push(slice);
	    }

	    for (const seg of segments) {
	        try {
	            const res = await fetch('/schedule/route', {
	                method: 'POST',
	                headers: { 'Content-Type': 'application/json' },
	                body: JSON.stringify({ points: seg })
	            });
	            if (!res.ok) throw new Error('route ' + res.status);
	            const data = await res.json();

	            const linePath = (data.path || []).map(
	                c => new kakao.maps.LatLng(c.lat, c.lng)
	            );
	            if (linePath.length < 2) continue;
	            
	            const pl = new kakao.maps.Polyline({
	            	map,
	                path: linePath,
	                strokeWeight: 5,
	                strokeColor: '#1F47E6',
	                strokeOpacity: 0.85,
	                strokeStyle: 'solid'});
	            polylines.push(pl);

	        } catch (e) {
	            new kakao.maps.Polyline({
	                map,
	                path: seg.map(p => new kakao.maps.LatLng(p.lat, p.lng)),
	                strokeWeight: 4,
	                strokeColor: '#94a3b8',
	                strokeOpacity: 0.7,
	                strokeStyle: 'shortdash'
	            });
	        }
	    }
	}
	
	// ── 마커 번호 이미지 생성 ────────────────
	function makeMarkerImage(num) {
	  const svg = `
	    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
	      <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="#1F47E6"/>
	      <text x="14" y="19" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">${num}</text>
	    </svg>`;
	  return new kakao.maps.MarkerImage(
	    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
	    new kakao.maps.Size(28, 36),
	    { offset: new kakao.maps.Point(14, 36) }
	  );
	}
	
	// ── 마커 전체 번호 이미지 갱신 ───────────
	function reindexMarkers() {
	  markers.forEach((m, i) => m.setImage(makeMarkerImage(i + 1)));
	}
	
	// ════════════════════════════════════════
	//  장소 검색
	// ════════════════════════════════════════
	const searchInput = document.getElementById('mapSearchInput');
	const searchBtn   = document.getElementById('mapSearchBtn');
	const resultsList = document.getElementById('mapSearchResults');
	
	function searchPlaces() {
	    const keyword = searchInput.value.trim();
	    if (!keyword) return;

	    fetch('/landmark/search?wished=false'
	        + '&q=' + encodeURIComponent(keyword)
	        + '&region=&page=0&size=10')
	    .then(res => res.json())
	    .then(data => {
	        resultsList.innerHTML = '';
	        const items = data.content || [];

	        if (items.length === 0) {
	            resultsList.innerHTML = '<li class="px-3 py-2 text-muted">검색 결과가 없습니다.</li>';
	            resultsList.classList.remove('hidden');
	            resultsList.classList.add('flex');
	            return;
	        }

	        items.forEach(place => {
	            const li = document.createElement('li');
	            li.className = 'flex cursor-pointer flex-col rounded-lg px-3 py-2 hover:bg-brand-soft';
	            li.innerHTML = `
	                <span class="font-semibold text-ink">${place.title}</span>
	                <span class="text-xs text-muted">${place.addr1 || ''}</span>`;
	            li.addEventListener('click', () => {
	                addPlaceToMap(place);
	                resultsList.classList.add('hidden');
	                resultsList.classList.remove('flex');
	                searchInput.value = '';
	            });
	            resultsList.appendChild(li);
	        });

	        resultsList.classList.remove('hidden');
	        resultsList.classList.add('flex');
	    })
	    .catch(() => {
	        resultsList.innerHTML = '<li class="px-3 py-2 text-muted">검색 중 오류가 발생했습니다.</li>';
	        resultsList.classList.remove('hidden');
	        resultsList.classList.add('flex');
	    });
	}

	function addPlaceToMap(place) {
	    const lat = place.mapy;
	    const lng = place.mapx;

	    if (!lat || !lng) {
	        alert('위치 정보가 없는 관광지입니다.');
	        return;
	    }

	    const latlng = new kakao.maps.LatLng(lat, lng);
	    const index  = markers.length + 1;

	    const marker = new kakao.maps.Marker({
	        map,
	        position: latlng,
	        image: makeMarkerImage(index)
	    });
	    markers.push(marker);
	    map.panTo(latlng);
	    updatePolyline();
	    fitBounds();
	    
	    addSpotCard(
    	    place.title,
    	    place.addr1 || '',
    	    index,
    	    lat,
    	    lng,
    	    place.contentId
    	);
	    
	    
	}
	
	searchBtn.addEventListener('click', searchPlaces);
	searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchPlaces(); });
	
	// 검색창 바깥 클릭 시 결과 닫기
	document.addEventListener('click', e => {
	  if (!searchInput.contains(e.target) && !searchBtn.contains(e.target) && !resultsList.contains(e.target)) {
	    resultsList.classList.add('hidden');
	    resultsList.classList.remove('flex');
	  }
	});
	
	
	
	// ════════════════════════════════════════
	//  별점
	// ════════════════════════════════════════
	const RATING_LABELS = ['', '별로예요', '그저그래요', '괜찮아요', '좋아요', '최고예요'];
	const BRAND = '#1F47E6';
	
	function initStars(card) {
	  const wrap   = card.querySelector('.stars-wrap');
	  const label  = card.querySelector('.rating-label');
	  const hidden = card.querySelector('.rating-value');
	  const stars  = wrap.querySelectorAll('.star-btn');
	
	  function paint(val) {
	    stars.forEach(s => {
	      s.style.color = parseInt(s.dataset.val) <= val ? BRAND : '#D1D5DB';
	    });
	  }
	
	  wrap.addEventListener('mousemove', e => {
	    const v = parseInt(e.target.dataset.val); if (!v) return;
	    paint(v); label.textContent = RATING_LABELS[v]; label.style.color = BRAND;
	  });
	  wrap.addEventListener('mouseleave', () => {
	    const cur = parseInt(hidden.value);
	    paint(cur);
	    label.textContent = cur ? RATING_LABELS[cur] : '별점을 선택해주세요';
	    label.style.color = cur ? BRAND : '';
	  });
	  wrap.addEventListener('click', e => {
	    const v = parseInt(e.target.dataset.val); if (!v) return;
	    hidden.value = v; paint(v);
	    label.textContent = RATING_LABELS[v]; label.style.color = BRAND;
	  });
	}
	
	
	// ════════════════════════════════════════
	//  관광지 카드 생성
	// ════════════════════════════════════════
	function addSpotCard(name = '', address = '', index, lat = '', lng = '', contentId = 0) {
	  document.getElementById('spotEmpty')?.remove();
	
	  const list = document.getElementById('spotList');
	  const num  = index ?? list.querySelectorAll('.spot-card').length + 1;
	  const idx  = num - 1;
	
	  const div = document.createElement('div');
	  div.className = 'spot-card rounded-xl border border-line p-5';
	  div.innerHTML = `
	    <input type="hidden" name="subList[${idx}].lat" value="${lat}" />
	    <input type="hidden" name="subList[${idx}].lng" value="${lng}" />
	    <div class="mb-4 flex items-center gap-3">
	      <span class="spot-num flex h-7 w-7 flex-none items-center justify-center rounded-full bg-brand-soft text-13 font-bold text-brand-ink">${num}</span>
	      
	      <div class="spot-name font-bold">
	        ${name}
	      </div>
	      <div class="flex-1">
	        <input type="text" 
	               name="subList[${idx}].contentTitle" 
	               class="spot-title-input w-full rounded-lg border border-line bg-white px-3 py-2 text-base font-bold outline-none transition placeholder:font-normal placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft"
	               placeholder="관광지 이름을 입력하세요"
	               value="${name}" />
	      </div>
	      <input type="hidden"
	             name="subList[${idx}].contentId"
	        class="spot-name-input flex-1 rounded-lg border border-line bg-white px-3 py-2 text-base font-bold outline-none transition placeholder:font-normal placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft"
	        placeholder="관광지 이름을 입력하세요"
	        	value="${contentId}"
	      />
	      <button type="button" class="remove-spot ml-2 text-xl text-faint transition hover:text-red-400" title="삭제">✕</button>
	    </div>
	    ${address ? `<div class="mb-3 text-xs text-muted">${address}</div>` : ''}
	    <div class="mb-3 flex items-center gap-2">
	      <div class="stars-wrap flex gap-0.5 text-2xl" style="color:#D1D5DB">
	        <span class="star-btn select-none cursor-pointer" data-val="1">★</span>
	        <span class="star-btn select-none cursor-pointer" data-val="2">★</span>
	        <span class="star-btn select-none cursor-pointer" data-val="3">★</span>
	        <span class="star-btn select-none cursor-pointer" data-val="4">★</span>
	        <span class="star-btn select-none cursor-pointer" data-val="5">★</span>
	      </div>
	      <span class="rating-label text-13 font-semibold text-muted">별점을 선택해주세요</span>
	      <input type="hidden" class="rating-value" name="subList[${idx}].rating" value="0" />
	    </div>
	    <textarea
	      name="subList[${idx}].travelSubContent"
	      class="min-h-24 w-full rounded-lg border border-line bg-white p-3 text-sm leading-relaxed outline-none transition focus:border-brand focus:ring-4 focus:ring-brand-soft"
	      placeholder="관광지에 대한 후기를 작성해주세요."></textarea>
	      <div class="mt-3 flex flex-col gap-2">
	      <label class="flex h-18 w-18 flex-col items-center justify-center gap-0.5 rounded-lg border border-dashed border-line bg-sunk text-faint transition hover:border-brand hover:text-brand cursor-pointer">
	        <span class="text-lg">＋</span>
	        <span class="text-xs">사진</span>
	        <input type="file" name="subList[${idx}].imageFiles" accept="image/*" class="hidden" multiple />
	      </label>
	      <div class="file-name-list text-xs text-muted flex flex-col gap-1"></div>
	    </div>
	  `;
	
	  // 카드 삭제 시 마커도 함께 제거
	  div.querySelector('.remove-spot').addEventListener('click', () => {
	    const idx = Array.from(list.querySelectorAll('.spot-card')).indexOf(div);
	    if (idx >= 0 && markers[idx]) {
	      markers[idx].setMap(null);
	      markers.splice(idx, 1);
	      reindexMarkers();
	      updatePolyline();
	      fitBounds();
	    }
	    div.remove();
	    reindexCards();   // 전역에 있는 완전한 버전 호출
	  });
	
	  initStars(div);
		//파일명 표시
	  const fileInput = div.querySelector('input[type="file"]');
	  const fileNameList = div.querySelector('.file-name-list');
	  let allFiles = []; // 누적 파일 저장
	
	  fileInput.addEventListener('change', function() {
	      // 새로 선택한 파일 누적
	      Array.from(this.files).forEach(file => {
	          // 중복 파일 제외
	          if (!allFiles.find(f => f.name === file.name && f.size === file.size)) {
	              allFiles.push(file);
	          }
	      });
	
	      // DataTransfer로 input에 누적 파일 반영
	      const dt = new DataTransfer();
	      allFiles.forEach(file => dt.items.add(file));
	      fileInput.files = dt.files;
	
	      // 파일명 표시
	      fileNameList.innerHTML = '';
	      allFiles.forEach((file, i) => {
	          const p = document.createElement('p');
	          p.className = 'flex items-center gap-1';
	          p.innerHTML = `📎 ${file.name} <button type="button" class="text-red-400 text-xs ml-1" data-index="${i}">✕</button>`;
	          fileNameList.appendChild(p);
	      });
	
	      // 개별 파일 삭제
	      fileNameList.querySelectorAll('button').forEach(btn => {
	          btn.addEventListener('click', function() {
	              const idx = parseInt(this.dataset.index);
	              allFiles.splice(idx, 1);
	              const dt = new DataTransfer();
	              allFiles.forEach(file => dt.items.add(file));
	              fileInput.files = dt.files;
	              // 파일명 다시 렌더링
	              fileNameList.innerHTML = '';
	              allFiles.forEach((file, i) => {
	                  const p = document.createElement('p');
	                  p.className = 'flex items-center gap-1';
	                  p.innerHTML = `📎 ${file.name} <button type="button" class="text-red-400 text-xs ml-1" data-index="${i}">✕</button>`;
	                  fileNameList.appendChild(p);
	              });
	          });
	      });
	  });
	  list.appendChild(div);
	  
	}
	function reindexCards() {
		  document.querySelectorAll('.spot-card').forEach((c, i) => {

		    c.querySelector('.spot-num').textContent = i + 1;

		    c.querySelector('input[name*="contentId"]').name = `subList[${i}].contentId`;
		    c.querySelector('input[name*="contentTitle"]').name = `subList[${i}].contentTitle`;
		    c.querySelector('.rating-value').name = `subList[${i}].rating`;
		    c.querySelector('textarea').name = `subList[${i}].travelSubContent`;
		    c.querySelector('input[type="file"]').name = `subList[${i}].imageFiles`;

		    const latInput = c.querySelector('input[name*="lat"]');
		    const lngInput = c.querySelector('input[name*="lng"]');

		    if (latInput) latInput.name = `subList[${i}].lat`;
		    if (lngInput) lngInput.name = `subList[${i}].lng`;
		  });
		}
	
	const form = document.getElementById("reviewForm");

	document.getElementById("submitBtn").addEventListener("click", function () {

	    // 제목
	    const title = document.getElementById("travelTitle");
	    if (title.value.trim() === "") {
	        openInfoModal("입력 오류", "여행 제목을 입력해주세요.");
	        title.focus();
	        return;
	    }

	    // 지역
	    const region = document.getElementById("region");
	    if (region.value === "") {
	        openInfoModal("입력 오류", "지역을 선택해주세요.");
	        region.focus();
	        return;
	    }

	    // 시작일
	    const startDate = document.getElementById("startDate");
	    if (startDate.value === "") {
	        openInfoModal("입력 오류", "여행 시작일을 선택해주세요.");
	        startDate.focus();
	        return;
	    }

	    // 종료일
	    const endDate = document.getElementById("endDate");
	    if (endDate.value === "") {
	        openInfoModal("입력 오류", "여행 종료일을 선택해주세요.");
	        endDate.focus();
	        return;
	    }

	    // 관광지
	    const cards = document.querySelectorAll(".spot-card");

	    if (cards.length === 0) {
	        openInfoModal("입력 오류", "관광지를 한 곳 이상 추가해주세요.");
	        return;
	    }

	    // 각 관광지 검사
	    for (let i = 0; i < cards.length; i++) {

	        const rating = cards[i].querySelector(".rating-value");
	        const review = cards[i].querySelector("textarea");

	        if (rating.value == "0") {
	            openInfoModal("입력 오류", `${i + 1}번째 관광지의 별점을 선택해주세요.`);
	            return;
	        }

	        if (review.value.trim() === "") {
	            openInfoModal("입력 오류", `${i + 1}번째 관광지의 후기를 작성해주세요.`);
	            review.focus();
	            return;
	        }
	    }

	    form.submit();
	});
	// ── 관광지 직접 추가 버튼 ─────────────────
	document.getElementById('addSpotBtn').addEventListener('click', () => addSpotCard());
	
	//일정에서 넘어온 경우 카드 복원
	const scheduleSubList = /*[[${review != null ? review.subList : null}]]*/ null;
	const scheduleTitle   = /*[[${scheduleTitle}]]*/ null;
	const scheduleStart   = /*[[${scheduleStartdate}]]*/ null;
	const scheduleEnd     = /*[[${scheduleEnddate}]]*/ null;

	if (scheduleSubList && scheduleSubList.length > 0) {
		// 제목/날짜 자동 채우기
		if (scheduleTitle) {
		    document.getElementById('travelTitle').value = scheduleTitle;
		}
		if (scheduleStart) {
		    document.getElementById('startDate').value = scheduleStart;
		}
		if (scheduleEnd) {
		    document.getElementById('endDate').value = scheduleEnd;
		}
	
		scheduleSubList.forEach((sub, i) => {
		    const lat = parseFloat(sub.lat || sub.LAT || 0);  // parseFloat 추가
		    const lng = parseFloat(sub.lng || sub.LNG || 0);  // parseFloat 추가
		    const title = sub.contentTitle || sub.CONTENT_TITLE || '';
		    const contentId = sub.contentId || sub.CONTENT_ID || 0;

		    addSpotCard(title, '', i + 1, lat, lng, contentId);

		    if (lat && lng) {
		        const latlng = new kakao.maps.LatLng(lat, lng);
		        const marker = new kakao.maps.Marker({
		            map,
		            position: latlng,
		            image: makeMarkerImage(i + 1)
		        });
		        markers.push(marker);
		    }
		});
	
		updatePolyline();
		fitBounds();
		
	}

	

});
document.addEventListener("DOMContentLoaded", function () {
	  // 1. 한국 시간(KST) 기준으로 오늘 날짜를 정확하게 구합니다.
	  
	 const now = new Date();

	const year = now.getFullYear();
	const month = String(now.getMonth() + 1).padStart(2, "0");
	const day = String(now.getDate()).padStart(2, "0");
		
	const today = `${year}-${month}-${day}`;
	 
	  const startDateInput = document.getElementById("startDate");
	  const endDateInput = document.getElementById("endDate");
	  
	  console.log(document.getElementById("startDate").max);
	  console.log(document.getElementById("endDate").max);

	  // 둘 다 오늘 이후로는 선택 불가능하게 설정
	  startDateInput.max = today;
	  endDateInput.max = today;

	  // 시작일이 바뀌면 종료일의 선택 가능 범위 제한
	  startDateInput.addEventListener("change", function () {
	    if (startDateInput.value) {
	      endDateInput.min = startDateInput.value;
	    } else {
	      endDateInput.removeAttribute("min"); // 시작일 비워지면 제한 해제 (UX 보완)
	    }
	  });

	  // 종료일이 바뀌면 시작일의 선택 가능 범위 제한
	  endDateInput.addEventListener("change", function () {
	    if (endDateInput.value) {
	      startDateInput.max = endDateInput.value;
	    } else {
	      startDateInput.max = today; // 종료일이 비워지면 다시 오늘로 리셋
	    }
	  });
	});

</script>
