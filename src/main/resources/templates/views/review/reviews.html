<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>여행 후기 — 떠나봄</title>
<script src="https://cdn.tailwindcss.com"></script>
<script th:src="@{/css/tw.js}"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=200;300;400;500;600;700;800&display=swap"
	rel="stylesheet" />
<style>
body {
	font-family: 'Noto Sans KR', system-ui, sans-serif;
	-webkit-font-smoothing: antialiased;
	letter-spacing: -0.01em;
}
</style>
</head>
<body class="bg-white text-ink">

	<div th:replace="~{views/common/navbar :: navbar}"></div>
	<div th:replace="~{views/common/modal :: modal}"></div>
	

	<main class="mx-auto max-w-wide px-6">
	  <div class="flex items-end justify-between pb-5 pt-12">
	    <div>
	      <span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">여행 후기 게시판</span>
	      <h1 class="mt-2 text-h2 font-extrabold tracking-tight">다녀온 여행, 통째로</h1>
	      <p class="mt-2 text-15 text-muted">한 번의 여행에서 들른 관광지들의 후기를 한 편의 글로 모아 남깁니다.</p>
	    </div>
	    <!-- 로그인 상태일 때 -->
		<a th:if="${session.loginUser != null}" href="/reviews/write" 
		   class="inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
		    후기 작성하기
		</a>
		
		<!-- 비로그인 상태일 때 -->
		<button th:if="${session.loginUser == null}" 
		        onclick="showToast('로그인이 필요한 기능이에요', false)"
		        class="inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
		    후기 작성하기
		</button>
	  </div>

		<div id="regionTabContainer" class="flex items-center gap-2 border-b border-line pb-5">
		    <span data-region="" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white">전체</span>
		    <span data-region="제주" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">제주</span>
		    <span data-region="수도권" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">수도권</span>
		    <span data-region="강원" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">강원</span>
		    <span data-region="충청" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">충청</span>
		    <span data-region="경상" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">경상</span>
		    <span data-region="전라" class="region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">전라</span>
		    
		    <div class="relative ml-auto">
		        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-faint" width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
		            <circle cx="8" cy="8" r="5.5" /><path d="M12.5 12.5L16 16" />
		        </svg>
		        <input class="h-9 w-56 rounded-full border border-line bg-white pl-9 pr-3 text-13 outline-none transition placeholder:text-faint focus:border-brand" placeholder="여행·관광지 검색" id="searchInput"/>
		    </div>
		    <select class="ml-2 h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none">
		        <option>최신순</option>
		        <option>추천 많은 순</option>
		        <option>조회수 높은 순</option>
		    </select>
		</div>

		<div id="reviewContainer" class="grid grid-cols-3 gap-5 py-6">
			<p class="col-span-3 py-12 text-center text-muted">리스트를 불러오는
				중입니다...</p>
		</div>

		<div class="flex justify-center gap-1 py-6">
			<div id="paginationContainer" class="flex justify-center gap-1 py-6"></div>
		</div>
	</main>

	<footer th:replace="~{views/common/footer :: footer}"></footer>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script>
	let currentPage = 1;
	let currentRegion = "";
	let currentKeyword = "";  

	window.onload = () => {
	    loadTravelList(currentPage);
	    bindRegionTabEvents();
	    bindSearchEvent();  
	};

	function bindRegionTabEvents() {
	    const tabs = document.querySelectorAll('.region-tab');
	    tabs.forEach(tab => {
	        tab.addEventListener('click', function() {
	            tabs.forEach(t => {
	                t.className = "region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink";
	            });
	            this.className = "region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white";

	            currentRegion = this.getAttribute('data-region');
	            currentPage = 1;
	            loadTravelList(currentPage);
	        });
	    });
	}

	// 검색 이벤트 바인딩 함수 추가
	function bindSearchEvent() {
    const searchInput = document.getElementById('searchInput');

    // 엔터 입력 시 검색
    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            currentKeyword = this.value.trim();
            currentPage = 1;
            loadTravelList(currentPage);
        	}
    	});
	}

	function loadTravelList(page) {
	    $.ajax({
	        url: '/selectReviewList',
	        type: 'GET',
	        data: {
	            currentPage: page,
	            region: currentRegion,
	            keyword: currentKeyword 
	        },
	        dataType: 'json',
	        success: function(response) {
	            const data = response.list;
	            const pi = response.pi;

	            const container = document.getElementById('reviewContainer');
	            container.innerHTML = '';

	            if (!data || data.length === 0) {
	                container.innerHTML = '<p class="col-span-3 py-12 text-center text-muted">등록된 여행 후기가 없습니다.</p>';
	                document.getElementById('paginationContainer').innerHTML = '';
	                return;
	            }

	            data.forEach(travel => {
	                const displayDate = travel.modifyDate ? travel.modifyDate : travel.createDate;
	                const cardHtml = `
	                  <a href="/reviews/detail?travelNo=${travel.travelNo}" class="flex flex-col overflow-hidden rounded-xl border border-line bg-white shadow-soft transition hover:-translate-y-1 hover:shadow-card">
	                    <div class="flex flex-1 flex-col gap-2 p-4">
	                      <div class="flex items-center gap-1.5 text-xs font-bold text-brand">
	                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
	                          <path d="M8 14s5-4.5 5-8A5 5 0 0 0 3 6c0 3.5 5 8 5 8Z"/><circle cx="8" cy="6" r="1.6"/>
	                        </svg>
	                        No. ${travel.travelNo}
	                      </div>
	                      <div class="text-lg font-bold tracking-tight text-ink line-clamp-1">${travel.travelTitle}</div>
	                      <div class="text-13 text-faint">등록일: ${displayDate}</div>
	                      <div class="mt-auto flex items-center gap-2 border-t border-line pt-3 text-13">
	                        <span class="flex h-6 w-6 items-center justify-center rounded-full bg-brand-soft text-11 font-bold text-brand-ink">M</span>
	                        <span class="font-semibold text-muted">회원 ${travel.nickname} </span>
	                        <span class="ml-auto text-muted text-xs">조회수 <span class="font-bold text-ink">${travel.count}</span></span>
	                      </div>
	                    </div>
	                  </a>
	                `;
	                container.insertAdjacentHTML('beforeend', cardHtml);
	            });
	            drawPagination(pi);
	        },
	        error: function(err) {
	            console.error("데이터 로딩 실패", err);
	        }
	    });
	}

	function drawPagination(pi) {
	    const pContainer = document.getElementById('paginationContainer');
	    if (!pContainer) return;

	    pContainer.innerHTML = '';
	    let html = '';

	    if (pi.currentPage > 1) {
	        html += `<button onclick="loadTravelList(${pi.currentPage - 1})" class="px-3 py-1 border rounded hover:bg-slate-100">이전</button>`;
	    }

	    for (let i = pi.startPage; i <= pi.endPage; i++) {
	        if (i === pi.currentPage) {
	            html += `<button class="px-3 py-1 border rounded bg-brand text-white font-bold">${i}</button>`;
	        } else {
	            html += `<button onclick="loadTravelList(${i})" class="px-3 py-1 border rounded hover:bg-slate-100">${i}</button>`;
	        }
	    }

	    if (pi.currentPage < pi.maxPage) {
	        html += `<button onclick="loadTravelList(${pi.currentPage + 1})" class="px-3 py-1 border rounded hover:bg-slate-100">다음</button>`;
	    }

	    pContainer.innerHTML = html;
	}
</script>

</body>
</html>
