<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body class="bg-white text-ink">

	<div th:replace="~{views/common/navbar :: navbar}"></div>
	<div th:replace="~{views/common/modal :: modal}"></div>
	

	<main class="mx-auto max-w-wide px-6">
	  <div class="flex items-end justify-between pb-5 pt-12">
	    <div>
	      <span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">여행 후기 게시판</span>
	      <h1 class="mt-2 text-h2 font-extrabold tracking-tight">다녀온 여행, 통째로</h1>
	      <p class="mt-2 text-15 text-muted">한 번의 여행에서 들른 관광지들의 후기를 한 편의 글로 모아 남깁니다.</p>
	    </div>
	    <!-- 로그인 상태일 때 -->
		<a th:if="${session.loginUser != null}" href="/reviews/write" 
		   class="inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
		    후기 작성하기
		</a>
		
		<!-- 비로그인 상태일 때 -->
		<button th:if="${session.loginUser == null}" 
		        onclick="showToast('로그인이 필요한 기능이에요', false)"
		        class="inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
		    후기 작성하기
		</button>
	  </div>

		<div id="regionTabContainer" class="flex items-center gap-2 pb-5">
		    <select id="regionSelect"
			        class="h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none">
			    <option value="">전체</option>
			    <option value="서울">서울</option>
			    <option value="부산">부산</option>
			    <option value="대구">대구</option>
			    <option value="인천">인천</option>
			    <option value="광주">광주</option>
			    <option value="대전">대전</option>
			    <option value="울산">울산</option>
			    <option value="세종">세종</option>
			    <option value="경기도">경기도</option>
			    <option value="강원">강원</option>
			    <option value="충북">충북</option>
			    <option value="충남">충남</option>
			    <option value="전북">전북</option>
			    <option value="전남">전남</option>
			    <option value="경북">경북</option>
			    <option value="경남">경남</option>
			    <option value="제주">제주</option>
			</select>
		    <select id="sortSelect"
			        class="ml-auto h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none">
			    <option value="latest">최신순</option>
			    <option value="like">추천 많은 순</option>
			    <option value="view">조회수 높은 순</option>
			</select>
			
			<div class="relative ml-2">
			    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-faint"
			         width="16" height="16" viewBox="0 0 18 18"
			         fill="none" stroke="currentColor" stroke-width="1.6">
			        <circle cx="8" cy="8" r="5.5" />
			        <path d="M12.5 12.5L16 16" />
			    </svg>
			    <input class="h-9 w-56 rounded-full border border-line bg-white pl-9 pr-3 text-13 outline-none transition placeholder:text-faint focus:border-brand"
			           placeholder="검색"
			           id="searchInput"/>
			</div>
		</div>


 <!-- ==================================================== 공지사항 ================================================================ -->
    
	    <div th:if="${not #lists.isEmpty(noticeList)}" class="mb-4 mt-0 overflow-hidden rounded-xl border border-blue-200 bg-blue-50">
		
		  <!-- 헤더 -->
		  <button type="button"
		          onclick="toggleNoticeBar()"
		          class="flex w-full items-center justify-between px-4 py-2.5 text-left">
		    <span class="flex items-center gap-2 text-13 font-semibold text-blue-700">
		    <i class="fa fa-bullhorn"></i>공지사항
		      <span class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-blue-600 px-1.5 text-11 font-bold text-white"
		            th:text="${#lists.size(noticeList)}">0</span>
		    </span>
		    <span id="notice-toggle-label" class="flex items-center gap-1 text-12 text-blue-500">
		      펼치기
		      <svg id="notice-chevron" width="12" height="12" viewBox="0 0 12 12"
		           fill="none" stroke="currentColor" stroke-width="2"
		           style="transition:transform 0.2s; transform:rotate(0deg)">
		        <path d="M2 4l4 4 4-4"/>
		      </svg>
		    </span>
		  </button>
		
		  <div id="notice-body" class="border-t border-blue-200" style="display:none">
		    <a th:each="notice, iter : ${noticeList}"
		       th:href="@{/reviews/notice(noticeNo=${notice.noticeNo})}"
		       class="flex items-center gap-3 border-b border-blue-100 px-4 py-2.5 text-13 transition last:border-b-0 hover:bg-blue-100">
		      <span class="min-w-5 text-right text-12 text-blue-400" th:text="${iter.index + 1}">1</span>
		      <span class="flex-1" th:text="${notice.title}">공지 제목</span>
		      <span class="text-12 text-muted" th:text="${notice.createDate}">날짜</span>
		    </a>
		  </div>
		
		</div>
	<!-- ==================================================== 공지사항 ================================================================ -->


		<div id="reviewContainer" class="grid grid-cols-3 gap-5 py-6">
			<p class="col-span-3 py-12 text-center text-muted">리스트를 불러오는
				중입니다...</p>
		</div>

		<div class="flex justify-center gap-1 py-6">
			<div id="paginationContainer" class="flex justify-center gap-1 py-6"></div>
		</div>
	</main>

	<footer th:replace="~{views/common/footer :: footer}"></footer>
	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script th:inline="javascript">
	let currentPage = 1;
	let currentRegion = "";
	let currentKeyword = "";  
	let sortType = 'latest';

	window.onload = () => {
	    loadTravelList(currentPage);
	    
	    bindSearchEvent();  
	};
	
	$('#regionSelect').on('change', function () {
	    currentRegion = $(this).val();
	    currentPage = 1;
	    loadTravelList(currentPage);
	});

	function bindRegionTabEvents() {
	    const tabs = document.querySelectorAll('.region-tab');
	    tabs.forEach(tab => {
	        tab.addEventListener('click', function() {
	            tabs.forEach(t => {
	                t.className = "region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink";
	            });
	            this.className = "region-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white";

	            currentRegion = this.getAttribute('data-region');
	            currentPage = 1;
	            loadTravelList(currentPage);
	        });
	    });
	}

	// 검색 이벤트 바인딩 함수 추가
	function bindSearchEvent() {
    const searchInput = document.getElementById('searchInput');

    // 엔터 입력 시 검색
    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            currentKeyword = this.value.trim();
            currentPage = 1;
            loadTravelList(currentPage);
        	}
    	});
	}

	$('#sortSelect').on('change', function () {
	    sortType = $(this).val();
	    loadTravelList(1);
	});
	function loadTravelList(page) {
	    $.ajax({
	        url: '/selectReviewList',
	        type: 'GET',
	        data: {
	            currentPage: page,
	            region: currentRegion,
	            keyword: currentKeyword,
	            sort: sortType
	        },
	        dataType: 'json',
	        success: function(response) {
	            const data = response.list;
	            const pi = response.pi;

	            const container = document.getElementById('reviewContainer');
	            container.innerHTML = '';

	            if (!data || data.length === 0) {
	                container.innerHTML = '<p class="col-span-3 py-12 text-center text-muted">등록된 여행 후기가 없습니다.</p>';
	                document.getElementById('paginationContainer').innerHTML = '';
	                return;
	            }

	            data.forEach(travel => {

	                const rawDate = travel.modifyDate ?? travel.createDate;
	                const displayDate = rawDate ? rawDate.substring(0, 10) : '';

	                const isMemberOnly = travel.visibility === 'MEMBER';

	                const cardHtml = `
	                  <div 
	                    class="flex flex-col overflow-hidden rounded-xl border border-line bg-white shadow-soft transition hover:-translate-y-1 hover:shadow-card cursor-pointer"
	                    onclick="goDetail(${travel.travelNo}, '${travel.visibility}')"
	                  >
	                    <div class="flex flex-1 flex-col gap-2 p-4">

	                      <div class="flex items-center gap-1.5 text-xs font-bold text-brand">
	                        No. ${travel.travelNo}
	                      </div>

	                      <div class="flex items-center gap-2">
	                        <div class="text-lg font-bold tracking-tight text-ink line-clamp-1">
	                          ${travel.travelTitle}
	                        </div>

	                        
	                        ${isMemberOnly
	                          ? '<span class="rounded-full bg-blue-100 px-2 py-1 text-xs font-semibold text-blue-700">회원</span>'
	                          : ''
	                        }
	                      </div>

	                      <div class="text-sm text-muted">
	                      	${travel.nickname}
	                      </div>
	                      <div class="text-13 text-faint">등록일: ${displayDate}</div>

	                      <div class="mt-auto flex justify-end gap-3 text-xs text-muted">
		                      <span>조회수 ${travel.count}</span>
		                      <span>추천 ${travel.likeCount}</span>
	
		                    </div>
	                    </div>
	                  </div>
	                `;

	                container.insertAdjacentHTML('beforeend', cardHtml);
	            });
	            drawPagination(pi);
	        },
	        error: function(xhr) {
	            if (xhr.status === 401) {
	                openInfoModal(
	                    "로그인이 필요합니다",
	                    "로그인 후 이용 가능합니다."
	                );
	                return;
	            }

	            console.error("데이터 로딩 실패", xhr);
	        }
	    });
	}
	function goDetail(travelNo, visibility) {

	    // 회원전용 게시글
	    if (visibility === 'MEMBER') {

	        // 로그인 체크 (세션 값 있으면 서버에서 내려줘야 정확하지만 프론트 간단 처리)
	        const loginUser = /*[[${session.loginUser}]]*/ null;

	        if (!loginUser) {
	            showToast('로그인이 필요한 게시글입니다', false);
	            return;
	        }
	    }

	    // 일반 or 로그인 사용자
	    location.href = `/reviews/detail?travelNo=${travelNo}`;
	}

	function drawPagination(pi) {
	    const pContainer = document.getElementById('paginationContainer');
	    if (!pContainer) return;
	    pContainer.innerHTML = '';
	    let html = `<div class="flex items-center justify-center gap-2 mt-6">`;

	    html += `
	        <button
	            onclick="loadTravelList(${pi.currentPage - 1})"
	            ${pi.currentPage <= 1 ? 'disabled' : ''}
	            class="px-2 text-gray-400 hover:text-gray-600 disabled:opacity-30"
	        >
	            ‹
	        </button>
	    `;

	    for (let i = pi.startPage; i <= pi.endPage; i++) {

	        if (i === pi.currentPage) {
	            html += `
	                <button
	                    class="w-8 h-8 flex items-center justify-center rounded-md bg-blue-600 text-white font-semibold"
	                >
	                    ${i}
	                </button>
	            `;
	        } else {
	            html += `
	                <button
	                	onclick="window.location.href='/reviews?page=${i}'"
	                    class="w-8 h-8 flex items-center justify-center rounded-md text-gray-600 hover:bg-gray-100"
	                >
	                    ${i}
	                </button>
	            `;
	        }
	    }

	    // 다음 버튼
	    html += `
	        <button
	            onclick="loadTravelList(${pi.currentPage + 1})"
	            ${pi.currentPage >= pi.maxPage ? 'disabled' : ''}
	            class="px-2 text-gray-400 hover:text-gray-600 disabled:opacity-30"
	        >
	            ›
	        </button>
	    `;
	    html += `</div>`;
	    pContainer.innerHTML = html;
	}
	
	$(document).ready(function () {
	    loadTravelList(1);
	});
	
	
	/* ============================================================ 공지사항 =================================================================  */
    function toggleNoticeBar() {
        const body    = document.getElementById('notice-body');
        const label   = document.getElementById('notice-toggle-label');
        const chevron = document.getElementById('notice-chevron');
        const isOpen  = body.style.display !== 'none';
        body.style.display      = isOpen ? 'none' : '';
        chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        label.childNodes[0].textContent = isOpen ? '펼치기 ' : '접기 ';
      }
    
    /* ============================================================ 공지사항 =================================================================  */
    
</script>

</body>
</html>
