<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body class="bg-white text-ink">

<div th:replace="~{views/common/navbar :: navbar}"></div>
<div th:replace="~{views/common/modal :: modal}"></div>

<main class="mx-auto max-w-post px-6 pb-24 pt-12">

  <!-- 브레드크럼 -->
  <div class="mb-5 text-13 text-muted">
    <a href="/reviews" class="hover:text-brand">여행 후기</a> ›
    <span th:text="${review.region}">지역</span>
  </div>

  <!-- 제목 영역 -->
  <div class="border-b border-line pb-5">
    <div class="mb-3 flex items-center gap-2">
      <span class="inline-flex h-7.5 items-center rounded-full bg-brand-soft px-3 text-13 font-medium text-brand-ink"
            th:text="${review.region}">지역</span>
      <span class="inline-flex h-7.5 items-center rounded-full border border-line px-3 text-13 font-medium text-muted">
		  관광지
		  <span th:text="${review.subList != null ? #lists.size(review.subList) : 0}"></span>
		  곳
	  </span>
    </div>
    <h1 class="mb-4 text-32 font-extrabold leading-tight tracking-tight" th:text="${review.travelTitle}">제목</h1>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2.5">
        <span class="flex h-10.5 w-10.5 items-center justify-center rounded-full bg-avatar font-extrabold text-white"
              th:text="${#strings.substring(review.nickname, 0, 1)}">M</span>
        <div>
          <div class="text-15 font-bold" th:text="${review.nickname}">별헤는밤</div>
          <div class="text-13 text-muted tabular-nums">
            작성일 <span th:text="${review.createDate}">날짜</span> ·
            조회 <span th:text="${review.count}">0</span>
          </div>
        </div>
      </div>
      <!-- 본인 글일 때만 수정/삭제 표시 -->
      <div class="ml-auto flex gap-2 text-13 text-muted"
           th:if="${session.loginUser != null and session.loginUser.memberNo == review.memberNo}">
        <a th:href="@{/reviews/update(travelNo=${review.travelNo})}" class="hover:text-brand">수정</a>
        <span class="text-line">·</span>
        <form id="deleteForm" action="/reviews/delete" method="post">
		    <input type="hidden" name="travelNo" th:value="${review.travelNo}">
		    <button type="button" th:onclick="|deleteReview(${review.travelNo})|">삭제</button>
		</form>
      </div>
      
<!-- =================================================================	신고 ============================================================================ -->
		<div class="ml-auto flex gap-2 text-13 text-muted"
		     th:if="${session.loginUser != null and session.loginUser.memberNo != review.memberNo}">
		  <button type="button" class="hover:text-red-500"
		          th:onclick="|openReportModal('review', [[${review.travelNo}]])|">신고</button>
		</div>
<!-- =================================================================	신고 ============================================================================ -->

    </div>
  </div>

  <!-- 요약 카드 -->

    <div class="rounded-xl bg-sunk p-4 text-center flex flex-col items-center justify-center gap-1">
      <b class="text-2xl font-extrabold tracking-tight tabular-nums"
         th:text="${review.subList != null ? #lists.size(review.subList) : 0} + '곳'">N곳</b>
      <span class="text-13 text-muted">들른 관광지</span>
    </div>

	  <b class="text-2xl font-extrabold tracking-tight tabular-nums"
	     th:text="${review.travelStartDate != null and review.travelEndDate != null} ?

            th:text="${idx.count}">1</span>
      <div class="flex-1">
        <div class="mb-3 flex items-center justify-between">
  
		  <div class="text-lg font-bold tracking-tight"

		    관광지명
		  </div>
		 <div class="flex items-center gap-1 text-sm">
			  <span th:each="i : ${#numbers.sequence(1,5)}"
			        th:text="${i <= (sub.rating != null ? sub.rating : 0)} ? '★' : '☆'"

			  </span>
			  <span class="ml-1 text-muted" th:text="${sub.rating}">5</span>
			</div>
			
		</div>
        <p class="mb-4 text-15 leading-loose text-ink/85" th:text="${sub.travelSubContent}">내용</p>

        <!-- 이미지 목록 -->
        <div class="mb-1 flex gap-2" th:if="${sub.images != null and not #lists.isEmpty(sub.images)}">
          <div th:each="imgPath : ${sub.images}">
            <img th:src="@{${imgPath}}" class="h-64 w-full rounded-xl object-cover" />
          </div>
          
        </div>
        <a th:href="@{/landmark/{id}/1(id=${sub.contentId})}" class="mt-3 inline-flex items-center gap-1.5 text-13 font-semibold text-brand"> 
        	<span th:text="${sub.contentTitle}"></span>관광지 정보 →</a>
      </div>
    </div>
  </div>

  <!-- 추천 버튼 -->

    <button id="likeBtn" th:data-travel-no="${review.travelNo}"

      ♥ 추천 <b id="likeCount" th:text="${review.likeCount}">0</b>
    </button>

    <h3 class="mb-5 text-lg font-bold">댓글</h3>

    <!-- 댓글 작성 -->

    <div class="mb-6 flex gap-3">
	  <span class="flex h-10 w-10 flex-none items-center justify-center rounded-full bg-avatar font-bold text-white"
	        th:if="${session.loginUser != null}"
	        th:text="${#strings.substring(session.loginUser.nickname, 0, 1)}">M</span>
	  <span class="flex h-10 w-10 flex-none items-center justify-center rounded-full bg-sunk font-bold text-faint" th:if="${session.loginUser == null}">?</span>
	  <div class="flex-1 overflow-hidden rounded-xl border border-line bg-white transition focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
	    <textarea id="reply-content"
	              class="block min-h-16 w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none placeholder:text-faint"
	              th:readonly="${session.loginUser == null}"
	              th:classappend="${session.loginUser == null} ? 'cursor-not-allowed bg-sunk' : ''"
	              placeholder="댓글을 남겨보세요"></textarea>

	    <div class="flex items-center justify-between border-t border-line py-2 pl-4 pr-2">
	      <span class="text-xs text-faint">여행자에게 따뜻한 한마디를 남겨보세요</span>
	      <button type="button"
	              onclick="handleReplySubmit()"
	              class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">등록</button>
	    </div>
	  </div>
	</div>
	    <!-- 댓글 목록 -->
	<div th:if="${replyList != null}">
	  <div th:each="r : ${replyList}" th:id="|reply-${r.replyNo}|" class="flex gap-3 border-t border-line py-4">

	    <span class="flex h-10 w-10 flex-none items-center justify-center rounded-full font-bold"
	          th:classappend="${r.writerStatus == 'N'} ? 'bg-gray-200 text-gray-400' : 'bg-avatar text-white'">
	      <i th:if="${r.writerStatus == 'N'}" class="ti ti-user-x" style="font-size:14px"></i>
	      <th:block th:unless="${r.writerStatus == 'N'}" th:text="${#strings.substring(r.displayWriter, 0, 1)}"></th:block>
	    </span>

	    <div class="flex-1">

	    <div class="flex items-center gap-2">
	      <span class="font-bold" th:text="${r.displayWriter}">작성자</span>
	      <span class="text-xs text-muted" th:text="${r.createDate}">날짜</span>
	      
<!-- =================================================================	신고 ============================================================================ -->
	     <div th:if="${session.loginUser != null and r.memberNo != null and session.loginUser.memberNo != r.memberNo}"
	           class="ml-auto flex gap-2 text-xs text-muted">
	        <button type="button" class="hover:text-red-500"
	                th:onclick="|openReportModal('reply', [[${r.replyNo}]])|">신고</button>
	      </div>
 <!-- =================================================================	신고 ============================================================================ -->   
	    </div>
	    <div th:if="${session.loginUser != null and session.loginUser.memberNo == r.memberNo}" class="flex gap-2 mt-2 text-xs">
		
		   <!-- 수정/삭제 버튼 -->
		    <div th:if="${session.loginUser != null and session.loginUser.memberNo == r.memberNo}"
		         class="ml-auto flex gap-2 text-xs text-muted">
		
		      <button type="button"
		              class="hover:text-brand"
		              th:onclick="|toggleEdit(${r.replyNo})|">
		        수정
		      </button>
		
		      <button type="button"
		              class="hover:text-red-500"
		              th:onclick="|openReplyDeleteModal(${r.replyNo})|">
		        삭제
		      </button>
		
		    </div>
		  </div>
		
		  <!-- ================= 일반 텍스트 ================= -->
		  <div th:id="|reply-view-${r.replyNo}|">
		    <p th:id="|reply-text-${r.replyNo}|"
		       class="text-15 leading-relaxed text-ink/85"
		       th:text="${r.content}">
		    </p>
		  </div>

		  <!-- ================= 수정 폼 ================= -->
		  <div th:id="|reply-edit-${r.replyNo}|" class="hidden mt-3">

		    <div class="overflow-hidden rounded-xl border border-line bg-white
		                focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">

		      <textarea th:id="|reply-edit-ta-${r.replyNo}|"
		                class="block min-h-16 w-full resize-none border-none bg-transparent

		                th:text="${r.content}">
		      </textarea>

		      <div class="flex items-center justify-end gap-2 border-t border-line py-2 px-3">

		        <button type="button"
		                class="inline-flex h-9 items-center rounded-lg border border-line px-4 text-sm text-muted hover:bg-sunk"
		                th:onclick="|toggleEdit(${r.replyNo})|">
		          취소
		        </button>

		        <button type="button"
		                th:onclick="|submitReplyEdit(${r.replyNo})|"
		                class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white">
		          저장
		        </button>

		      </div>

		    </div>
		  </div>
		
		</div>
	  </div>
	</div>
  </section>
</main>

	    <h2 class="mb-4 text-lg font-bold">신고하기</h2>

	    </div>

<script th:src="@{'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoApiKey} + '&libraries=services'}"></script>
<script th:inline="javascript">

const spotCoords = /*[[${review.subList}]]*/ [];

async function initDetailMap() {
	  const mapContainer = document.getElementById('map');
	  if (!mapContainer) return;

	  const validSpots = spotCoords.filter(s =>
	    s.lat != null && s.lng != null && s.lat != 0 && s.lng != 0
	  );

	  if (validSpots.length === 0) {
		    const mapSection = mapContainer.closest('.map-section') || mapContainer;
		    mapSection.style.display = 'none';
		    return;
		}
	  /*if (validSpots.length === 0) {
	    mapContainer.innerHTML = '등록된 위치 정보 없음';
	    return;
	  }*/

	  const map = new kakao.maps.Map(mapContainer, {
	    center: new kakao.maps.LatLng(validSpots[0].lat, validSpots[0].lng),
	    level: 9
	  });

	  const bounds = new kakao.maps.LatLngBounds();

	  validSpots.forEach((spot, i) => {
	    const latlng = new kakao.maps.LatLng(spot.lat, spot.lng);

	    new kakao.maps.Marker({ map, position: latlng });

	    new kakao.maps.CustomOverlay({
	      map,
	      position: latlng,
	      yAnchor: 2.1,
	      content: `<div style="background:#1F47E6;color:#fff;width:22px;height:22px;
	                border-radius:50%;display:flex;align-items:center;justify-content:center;
	                font-size:12px;font-weight:700;border:2px solid #fff;
	                box-shadow:0 1px 3px rgba(0,0,0,.3)">${i + 1}</div>`
	    });

	    bounds.extend(latlng);
	  });

	  map.setBounds(bounds);

	  if (validSpots.length >= 2) {
	    await drawRoadPath(map, validSpots);
	  }
	}

	async function drawRoadPath(map, spots) {
	  const points = spots.map(s => ({ lat: s.lat, lng: s.lng }));

	  const MAX_POINTS_PER_CALL = 7;
	  const segments = [];
	  for (let i = 0; i < points.length - 1; i += (MAX_POINTS_PER_CALL - 1)) {
	    const slice = points.slice(i, i + MAX_POINTS_PER_CALL);
	    if (slice.length >= 2) segments.push(slice);
	  }

	  for (const seg of segments) {
	    try {
	      const res = await fetch('/schedule/route', {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/json' },
	        body: JSON.stringify({ points: seg })
	      });
	      if (!res.ok) throw new Error('route ' + res.status);
	      const data = await res.json();

	      const linePath = (data.path || []).map(
	        c => new kakao.maps.LatLng(c.lat, c.lng)
	      );
	      if (linePath.length < 2) continue;

	      new kakao.maps.Polyline({
	        map,
	        path: linePath,
	        strokeWeight: 5,
	        strokeColor: '#1F47E6',
	        strokeOpacity: 0.85,
	        strokeStyle: 'solid'
	      });

	    } catch (e) {
	      new kakao.maps.Polyline({
	        map,
	        path: seg.map(p => new kakao.maps.LatLng(p.lat, p.lng)),
	        strokeWeight: 4,
	        strokeColor: '#94a3b8',
	        strokeOpacity: 0.7,
	        strokeStyle: 'shortdash'
	      });
	    }
	  }
	}

/* ⭐ 핵심: "SDK 준비될 때까지 기다리는 단 하나의 루프" */
function waitForKakao() {
  if (window.kakao && kakao.maps && kakao.maps.load) {
    kakao.maps.load(function () {
      initDetailMap();
    });
  } else if (window.kakao && kakao.maps) {
    initDetailMap();
  } else {
    setTimeout(waitForKakao, 50);
  }
}

window.onload = waitForKakao;


function toggleLike() {
  const loginUser = /*[[${session.loginUser}]]*/ null;

  if (!loginUser) {
    openInfoModal(
      "로그인이 필요합니다",
      "좋아요는 로그인 후 이용 가능합니다."
    );
    return;
  }

  const travelNo = document.getElementById('likeBtn').dataset.travelNo;

  fetch('/reviews/like', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ travelNo })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('likeCount').textContent = data.likeCount;
  });
}
const replyLoginRequired = /*[[${session.loginUser == null}]]*/ true;

function handleReplySubmit() {
    if (replyLoginRequired) {
        openInfoModal('로그인이 필요합니다', '로그인 후 댓글을 작성할 수 있어요.');
        return;
    }
    submitReplyInsert();
}

function submitReplyInsert() {
    const content = document.getElementById('reply-content').value.trim();
    if (!content) { openInfoModal('알림', '댓글 내용을 입력해주세요.'); return; }

    fetch('/reply/ajax/insert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: JSON.stringify({ content: content, postNo: /*[[${review.travelNo}]]*/ 0, postBoard: 'T' })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) { openInfoModal('알림', data.message); return; }
        document.getElementById('reply-content').value = '';
        appendReplyDOM(data);
    });
}

function appendReplyDOM(d) {
    document.querySelector('section').insertAdjacentHTML('beforeend', `
      <div id="reply-${d.replyNo}" class="flex gap-3 border-t border-line py-4">
        <span class="flex h-10 w-10 flex-none items-center justify-center rounded-full bg-sunk font-bold text-muted">
          ${d.writer ? d.writer.charAt(0) : '?'}
        </span>
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <span class="font-bold">${d.writer}</span>
            <span class="text-xs text-muted">${d.createDate}</span>
            <span class="ml-auto flex gap-2 text-xs text-muted">
              <button type="button" class="hover:text-brand" onclick="toggleEdit(${d.replyNo})">수정</button>
              <button type="button" class="hover:text-red-500" onclick="openReplyDeleteModal(${d.replyNo})">삭제</button>
            </span>
          </div>
          <div id="reply-view-${d.replyNo}">
            <p id="reply-text-${d.replyNo}" class="text-15 leading-relaxed text-ink/85">${d.content}</p>
          </div>
          <div id="reply-edit-${d.replyNo}" class="hidden mt-3">
            <div class="overflow-hidden rounded-xl border border-line bg-white focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
              <textarea id="reply-edit-ta-${d.replyNo}" class="block min-h-16 w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none">${d.content}</textarea>
              <div class="flex items-center justify-end gap-2 border-t border-line py-2 px-3">
                <button type="button" class="inline-flex h-9 items-center rounded-lg border border-line px-4 text-sm text-muted hover:bg-sunk" onclick="toggleEdit(${d.replyNo})">취소</button>
                <button type="button" class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white" onclick="submitReplyEdit(${d.replyNo})">저장</button>
              </div>
            </div>
          </div>
        </div>
      </div>`);
}

function toggleEdit(replyNo) {

    const view = document.getElementById(`reply-view-${replyNo}`);
    const edit = document.getElementById(`reply-edit-${replyNo}`);

    if (!view || !edit) return;

    if (edit.classList.contains("hidden")) {
        view.style.display = "none";
        edit.classList.remove("hidden");
    }
    else {
        view.style.display = "block";
        edit.classList.add("hidden");
    }
}

function submitReplyEdit(replyNo) {
    const ta = document.getElementById('reply-edit-ta-' + replyNo);
    if (!ta.value.trim()) { openInfoModal('알림', '댓글 내용을 입력해주세요.'); return; }

    fetch('/reply/ajax/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: JSON.stringify({ replyNo: replyNo, content: ta.value.trim() })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) { openInfoModal('알림', data.message); return; }
        document.getElementById('reply-text-' + replyNo).textContent = ta.value.trim();
        toggleEdit(replyNo);
    });
}

function openReplyDeleteModal(replyNo) {
    openDangerModal(
        '댓글을 삭제할까요?',
        '삭제한 댓글은 되돌릴 수 없어요.',
        function () {
            fetch('/reply/ajax/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                body: JSON.stringify({ replyNo: replyNo })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.success) { openInfoModal('알림', data.message); return; }
                document.getElementById('reply-' + replyNo)?.remove();
            });
        }
    );
}



//=================================================================	신고 ============================================================================ 
	let reportTargetType = null;
	let reportTargetNo   = null;

	function openReportModal(targetType, targetNo) {
	  reportTargetType = targetType;
	  reportTargetNo   = targetNo;
	  document.getElementById('report-reason').value = '';
	  const modal = document.getElementById('modal-report');
	  modal.classList.remove('hidden');
	  modal.classList.add('flex');
	}
	
	function closeReportModal() {
	  const modal = document.getElementById('modal-report');
	  modal.classList.add('hidden');
	  modal.classList.remove('flex');
	}
	
	function submitReport() {
	  const reason = document.getElementById('report-reason').value;
	  if (!reason) {
	    openInfoModal('알림', '신고 사유를 선택해주세요.');
	    return;
	  }
	  fetch('/report/insert', {
	    method: 'POST',
	    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	    body: 'targetType=' + reportTargetType
	        + '&targetNo='  + reportTargetNo
	        + '&reason='    + encodeURIComponent(reason)
	  })
	  .then(r => r.json())
	  .then(data => {
	    closeReportModal();
	    openInfoModal(data.status === 'success' ? '신고 완료' : '알림', data.message);
	  });
	  
	}
	function deleteReview(travelNo) {
	    openDangerModal(
	        "게시글 삭제",
	        "정말 삭제하시겠습니까?",
	        () => {
	            document.getElementById("deleteForm").submit();
	        },
	        "삭제"
	    );
	
	}


</script>
