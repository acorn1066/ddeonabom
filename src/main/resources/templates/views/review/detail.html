<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title th:text="${review.travelTitle} + ' — 여행 후기'">여행 후기 상세</title>
<script src="https://cdn.tailwindcss.com"></script>
<script th:src="@{/css/tw.js}"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style> body { font-family:'Noto Sans KR', system-ui, sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-0.01em; } </style>
</head>
<body class="bg-white text-ink">

<div th:replace="~{views/common/navbar :: navbar}"></div>

<main class="mx-auto max-w-post px-6 pb-24 pt-12">

  <!-- 브레드크럼 -->
  <div class="mb-5 text-13 text-muted">
    <a href="/reviews" class="hover:text-brand">여행 후기</a> ›
    <span th:text="${review.region}">지역</span>
  </div>

  <!-- 제목 영역 -->
  <div class="border-b border-line pb-5">
    <div class="mb-3 flex items-center gap-2">
      <span class="inline-flex h-7.5 items-center rounded-full bg-brand-soft px-3 text-13 font-medium text-brand-ink"
            th:text="${review.region}">지역</span>
      <span class="inline-flex h-7.5 items-center rounded-full border border-line px-3 text-13 font-medium text-muted"
            th:if="${review.subList != null}"
            th:text="'관광지 ' + ${#lists.size(review.subList)} + '곳'">관광지 N곳</span>
    </div>
    <h1 class="mb-4 text-32 font-extrabold leading-tight tracking-tight" th:text="${review.travelTitle}">제목</h1>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2.5">
        <span class="flex h-10.5 w-10.5 items-center justify-center rounded-full bg-brand font-extrabold text-white">M</span>
        <div>
          <div class="text-13 text-muted tabular-nums">
            작성일 <span th:text="${review.createDate}">날짜</span> ·
            조회 <span th:text="${review.count}">0</span>
          </div>
        </div>
      </div>
      <!-- 본인 글일 때만 수정/삭제 표시 -->
      <div class="ml-auto flex gap-2 text-13 text-muted"
           th:if="${session.loginUser != null and session.loginUser.memberNo == review.memberNo}">
        <a th:href="@{/reviews/update(travelNo=${review.travelNo})}" class="hover:text-brand">수정</a>
        <span class="text-line">·</span>
        <a th:href="@{/reviews/delete(travelNo=${review.travelNo})}"
           onclick="return confirm('정말 삭제하시겠습니까?')"
           class="hover:text-brand">삭제</a>
      </div>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div class="my-6 grid grid-cols-2 gap-3">
    <div class="rounded-xl bg-sunk p-4 text-center">
      <b class="block text-2xl font-extrabold tracking-tight tabular-nums"
         th:text="${review.subList != null ? #lists.size(review.subList) : 0} + '곳'">N곳</b>
      <span class="text-13 text-muted">들른 관광지</span>
    </div>
    <div class="rounded-xl bg-sunk p-4 text-center">
      <b class="block text-2xl font-extrabold tracking-tight tabular-nums"
         th:text="${review.likeCount}">0</b>
      <span class="text-13 text-muted">추천수</span>
    </div>
  </div>

  <!-- 동선 지도 -->
  <div class="relative my-7 overflow-hidden rounded-2xl shadow-card" th:if="${review.subList != null and not #lists.isEmpty(review.subList)}">
    <div id="map" class="h-80 w-full"></div>
  </div>

  <!-- 관광지 목록 -->
  <div th:if="${review.subList != null}">
    <div th:each="sub, idx : ${review.subList}" class="flex gap-5 border-t border-line py-6">
      <span class="flex h-9 w-9 flex-none items-center justify-center rounded-full bg-brand text-15 font-extrabold text-white"
            th:text="${idx.count}">1</span>
      <div class="flex-1">
        <div class="mb-3 flex items-center justify-between">
  
		  <div class="text-lg font-bold tracking-tight"
		       th:text="${sub.contentId}">
		    관광지명
		  </div>
		  <div class="flex items-center gap-1 text-yellow-400 text-sm">
		    ★★★★★
		    <span class="ml-1 text-muted"
		          th:text="${sub.rating}">
		      5
		    </span>
		  </div>
		</div>
        <p class="mb-4 text-15 leading-loose text-ink/85" th:text="${sub.travelSubContent}">내용</p>

        <!-- 이미지 목록 -->
        <div class="mb-1 flex gap-2" th:if="${sub.images != null and not #lists.isEmpty(sub.images)}">
          <div th:each="imgPath : ${sub.images}">
            <img th:src="@{${imgPath}}" class="h-20 w-28 rounded-lg object-cover" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 추천 버튼 -->
  <div class="mt-4 flex items-center justify-center gap-3 border-t-2 border-ink py-7">
    <button id="likeBtn" th:data-travel-no="${review.travelNo}"
            onclick="toggleLike()"
            class="inline-flex h-12 items-center gap-2 rounded-full border border-line bg-white px-7 text-15 font-bold transition hover:bg-sunk">
      ♥ 추천 <b id="likeCount" th:text="${review.likeCount}">0</b>
    </button>
  </div>

  <!-- 댓글 섹션 -->
  <section class="mt-6">
    <h3 class="mb-5 text-lg font-bold">댓글</h3>

    <!-- 댓글 작성 (로그인 시만) -->
    <div class="mb-6 flex gap-3" th:if="${session.loginUser != null}">
      <span class="flex h-10 w-10 flex-none items-center justify-center rounded-full bg-brand-soft font-bold text-brand-ink">M</span>
      <div class="flex-1 overflow-hidden rounded-xl border border-line bg-white transition focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
        <form th:action="@{/reviews/comment/insert}" method="post">
          <input type="hidden" name="travelNo" th:value="${review.travelNo}" />
          <textarea name="commentContent"
                    class="block min-h-16 w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none placeholder:text-faint"
                    placeholder="댓글을 남겨보세요"></textarea>
          <div class="flex items-center justify-between border-t border-line py-2 pl-4 pr-2">
            <span class="text-xs text-faint">여행자에게 따뜻한 한마디를 남겨보세요</span>
            <button type="submit" class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">등록</button>
          </div>
        </form>
      </div>
    </div>


  </section>
</main>

<footer th:replace="~{views/common/footer :: footer}"></footer>

<script th:src="@{'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoApiKey} + '&libraries=services'}"></script>
<script>
function toggleLike() {
  const travelNo = document.getElementById('likeBtn').dataset.travelNo;
  fetch('/reviews/like?travelNo=' + travelNo, { method: 'POST' })
    .then(res => res.json())
    .then(data => {
      document.getElementById('likeCount').textContent = data.likeCount;
    });
}

// 관광지 좌표 목록 (서버에서 내려준 값으로 채워짐)
const spotCoords = /*[[${review.subList}]]*/ [];

function makeMarkerImage(num) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="#1F47E6"/>
      <text x="14" y="19" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">${num}</text>
    </svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(28, 36),
    { offset: new kakao.maps.Point(14, 36) }
  );
}

function initDetailMap() {
  const mapContainer = document.getElementById('map');
  if (!mapContainer) return;

  const validSpots = spotCoords.filter(s => s.lat && s.lng);
  if (validSpots.length === 0) {
    mapContainer.innerHTML = '<div class="flex h-full items-center justify-center text-muted text-sm">등록된 위치 정보가 없습니다.</div>';
    return;
  }

  const map = new kakao.maps.Map(mapContainer, {
    center: new kakao.maps.LatLng(validSpots[0].lat, validSpots[0].lng),
    level: 9
  });

  const bounds = new kakao.maps.LatLngBounds();
  const path = [];

  validSpots.forEach((spot, i) => {
    const latlng = new kakao.maps.LatLng(spot.lat, spot.lng);
    new kakao.maps.Marker({
      map,
      position: latlng,
      image: makeMarkerImage(i + 1)
    });
    bounds.extend(latlng);
    path.push(latlng);
  });

  // 동선 폴리라인
  new kakao.maps.Polyline({
    map,
    path,
    strokeWeight: 2.5,
    strokeColor: '#1F47E6',
    strokeOpacity: 0.9,
    strokeStyle: 'solid'
  });

  map.setBounds(bounds);
}

window.addEventListener('load', initDetailMap);
</script>

</body>
</html>
