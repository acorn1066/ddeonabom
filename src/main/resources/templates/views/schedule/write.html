<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body class="flex h-screen flex-col overflow-hidden bg-white text-ink">
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	<div class="px-6">
		<section class="flex items-start justify-between gap-5 border-b border-line py-8">
			<div>
				<div class="flex items-center gap-2">
					<span class="inline-flex h-7.5 items-center rounded-full border border-dashed border-line bg-white px-3 text-13 font-medium text-faint">
						지역 미정
					</span> 
				</div>
				<div class="my-2 flex items-center gap-2">
					<h1 class="text-3xl font-extrabold tracking-tight text-faint">
						제목 없는 일정</h1>
					<svg class="text-faint" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
						<path d="M11 2l3 3-8 8H3v-3z" />
					</svg>
				</div>
				<div class="mt-3 flex items-end gap-3">
					<div class="flex flex-col gap-1">
						<label class="text-xs font-semibold text-muted">시작 날짜</label>
						<div class="flex h-10 min-w-date cursor-pointer items-center gap-2 rounded-lg border border-line bg-white px-3.5 text-sm font-semibold text-faint transition hover:border-brand">
							<svg class="text-faint" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
								<rect x="2.5" y="3" width="11" height="10.5" rx="1.5" />
								<path d="M2.5 6h11M5.5 1.5v2.5M10.5 1.5v2.5" />
							</svg>
							<span>날짜 선택</span>
						</div>
					</div>
					<span class="pb-2.5 text-faint">—</span>
					<div class="flex flex-col gap-1">
						<label class="text-xs font-semibold text-muted">종료 날짜</label>
						<div class="flex h-10 min-w-date cursor-pointer items-center gap-2 rounded-lg border border-line bg-white px-3.5 text-sm font-semibold text-faint transition hover:border-brand">
							<svg class="text-faint" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
								<rect x="2.5" y="3" width="11" height="10.5" rx="1.5" />
								<path d="M2.5 6h11M5.5 1.5v2.5M10.5 1.5v2.5" />
							</svg>
							<span>날짜 선택</span>
						</div>
					</div>
				</div>
			</div>
			<div class="flex gap-2">
				<button class="inline-flex h-11 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-err transition hover:border-err hover:bg-err hover:text-white">삭제</button>
				<button class="inline-flex h-11 cursor-not-allowed items-center gap-2 rounded-lg border border-line bg-white px-4 text-sm font-semibold text-faint" disabled>
					<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
						<circle cx="4" cy="8" r="1.6" />
						<circle cx="12" cy="4" r="1.6" />
						<circle cx="12" cy="12" r="1.6" />
						<path d="M5.4 7.2 10.6 4.6 M5.4 8.8 10.6 11.4" />
					</svg>
					공유 게시판에 게시
				</button>
				<button class="inline-flex h-11 items-center rounded-lg bg-brand px-5 text-sm font-semibold text-white transition hover:bg-brand-ink">저장</button>
			</div>
		</section>
	</div>

	<!-- ════════════ PLANNER SPLIT ════════════ -->
	<div class="grid min-h-0 flex-1 grid-cols-plan">
		<!-- list -->
		<div class="flex flex-col overflow-hidden border-r border-line">
			<div class="flex gap-2 border-b border-line px-5 py-4">
				<div class="flex-1 rounded-xl border border-dashed border-line bg-sunk p-3 text-center">
					<b class="block text-sm font-bold text-muted">DAY 1</b>
					<span class="text-xs text-faint">날짜 미정</span>
				</div>
				<div class="flex flex-1 items-center px-1 text-xs leading-snug text-faint">
					날짜를 정하면 일자별로 나뉘어요
				</div>
			</div>

			<!-- 빈 상태 : 담은 장소 0곳 -->
			<div class="flex flex-1 flex-col items-center justify-center gap-3 px-8 py-10 text-center">
				<span class="mb-1 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
					<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			          <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			          <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			          <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
			        </svg>
				</span>
				<h2 class="text-lg font-bold tracking-tight">아직 담은 장소가 없어요</h2>
				<p class="max-w-xs text-13 leading-relaxed text-muted">
					관심 관광지에서 장소를 담으면<br />지도 위에 동선이 자동으로 그려져요.
				</p>
				<button class="mt-2 inline-flex h-11 items-center gap-2 rounded-lg bg-brand px-6 text-sm font-semibold text-white transition hover:bg-brand-ink">
					<span class="text-lg leading-none">＋</span> 장소 추가
				</button>
				<a href="sites.html" class="text-13 font-medium text-faint underline-offset-4 transition hover:text-muted hover:underline">
					관광지 둘러보기
				</a>
			</div>
		</div>

		<!-- map (빈 지도) -->
		<div class="relative" id="map">
		</div>
	</div>
	<div th:replace="~{views/common/kakao-map :: kakao-map}"></div>
	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
</body>
</html>
