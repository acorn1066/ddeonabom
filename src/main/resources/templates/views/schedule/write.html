<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body class="flex h-screen flex-col overflow-hidden bg-white text-ink">
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	<div class="px-6">
		<section class="flex items-start justify-between gap-5 border-b border-line py-8">
			<div>
				<div class="flex items-center gap-2">
					<span id="region_badge" class="inline-flex h-7.5 items-center rounded-full border border-dashed border-line bg-white px-3 text-13 font-medium text-faint">
						지역 미정
					</span>
				</div>
				<div class="my-2 flex items-center gap-2">
				    <h1 class="text-3xl font-extrabold tracking-tight text-faint" id="schedule_title">제목 없는 일정</h1>
				    <input type="text" id="schedule_title_input" class="hidden text-3xl font-extrabold tracking-tight text-faint bg-transparent border-b border-faint outline-none"
				           value="제목 없는 일정" onblur="changeTitle();" onkeydown="if(event.key==='Enter'){ event.preventDefault(); this.blur(); }"/>
				    <svg class="text-faint cursor-pointer" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" onclick="changeTitle();">
				        <path d="M11 2l3 3-8 8H3v-3z" />
				    </svg>
				</div>
				<div class="mt-3 flex items-end gap-3">
				    <div class="flex flex-col gap-1">
				        <label class="text-xs font-semibold text-muted">시작 날짜</label>
				        <div class="relative flex h-10 min-w-date cursor-pointer items-center gap-2 rounded-lg border border-line bg-white px-3.5 text-sm font-semibold text-faint transition hover:border-brand"
				             onclick="document.getElementById('start_date_input').showPicker()">
				            <svg class="text-faint" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
				                <rect x="2.5" y="3" width="11" height="10.5" rx="1.5" />
				                <path d="M2.5 6h11M5.5 1.5v2.5M10.5 1.5v2.5" />
				            </svg>
				            <span id="start_date_label">날짜 선택</span>
				            <input type="date" id="start_date_input" style="position:absolute; top:100%; left:0; opacity:0; width:1px; height:1px;" onchange="onStartDateChange(this.value)" />
				        </div>
				    </div>
				    <span class="pb-2.5 text-faint">—</span>
				    <div class="flex flex-col gap-1">
				        <label class="text-xs font-semibold text-muted">종료 날짜</label>
				        <div class="relative flex h-10 min-w-date cursor-pointer items-center gap-2 rounded-lg border border-line bg-white px-3.5 text-sm font-semibold text-faint transition hover:border-brand"
				             onclick="document.getElementById('end_date_input').showPicker()">
				            <svg class="text-faint" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
				                <rect x="2.5" y="3" width="11" height="10.5" rx="1.5" />
				                <path d="M2.5 6h11M5.5 1.5v2.5M10.5 1.5v2.5" />
				            </svg>
				            <span id="end_date_label">날짜 선택</span>
				            <input type="date" id="end_date_input" style="position:absolute; top:100%; left:0; opacity:0; width:1px; height:1px;" onchange="onEndDateChange(this.value)" />
				        </div>
				    </div>
				</div>
			</div>
			<div class="flex gap-2">
				<button id="deleteBtn" onclick="confirmDelete()" class="inline-flex h-11 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-err transition hover:border-err hover:bg-err hover:text-white">삭제</button>
				<button id="shareBtn" onclick="toggleShare()" class="inline-flex h-11 items-center gap-2 rounded-lg border border-line bg-white px-4 text-sm font-semibold text-faint transition hover:border-brand hover:text-brand">
				    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
				        <circle cx="4" cy="8" r="1.6" />
				        <circle cx="12" cy="4" r="1.6" />
				        <circle cx="12" cy="12" r="1.6" />
				        <path d="M5.4 7.2 10.6 4.6 M5.4 8.8 10.6 11.4" />
				    </svg>
				    <span id="shareBtnText">공유 게시판에 게시</span>
				</button>
				<button onclick="saveSchedule()" class="inline-flex h-11 items-center rounded-lg bg-brand px-5 text-sm font-semibold text-white transition hover:bg-brand-ink">저장</button>
			</div>
		</section>
	</div>

	<!-- ════════════ PLANNER SPLIT ════════════ -->
	<div class="grid min-h-0 flex-1 grid-cols-plan">
		<!-- list -->
		<div class="flex flex-col overflow-hidden border-r border-line">

			<!-- 탭 영역 - 날짜 있을 때 -->
			<div id="day_tab_area" class="hidden border-b border-line px-5 py-4">
			    <div class="flex items-center gap-2">
			        <button id="tab_prev" onclick="scrollTabs(-1)" class="hidden flex h-7 w-7 flex-none items-center justify-center rounded-lg border border-line bg-white text-muted transition hover:border-brand hover:text-brand">
			            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
			                <path d="M10 3L5 8l5 5"/>
			            </svg>
			        </button>
			        <div id="day_tabs" class="flex flex-1 gap-2 overflow-x-auto" style="scrollbar-width:none; -ms-overflow-style:none;"></div>
			        <button id="tab_next" onclick="scrollTabs(1)" class="hidden flex h-7 w-7 flex-none items-center justify-center rounded-lg border border-line bg-white text-muted transition hover:border-brand hover:text-brand">
			            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
			                <path d="M6 3l5 5-5 5"/>
			            </svg>
			        </button>
			    </div>
			</div>

			<!-- 탭 영역 - 날짜 없을 때 -->
			<div id="day_tab_empty" class="flex gap-2 border-b border-line px-5 py-4">
				<div class="flex-1 rounded-xl border border-dashed border-line bg-sunk p-3 text-center">
					<b class="block text-sm font-bold text-muted">DAY 1</b>
					<span class="text-xs text-faint">날짜 미정</span>
				</div>
				<div class="flex flex-1 items-center px-1 text-xs leading-snug text-faint">
					날짜를 정하면 일자별로 나뉘어요
				</div>
			</div>

			<!-- 빈 상태 : 담은 장소 0곳 -->
			<div id="empty_no_date" class="flex flex-1 flex-col items-center justify-center gap-3 px-8 py-10 text-center">
			    <span class="mb-1 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
			        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			            <rect x="3" y="4" width="18" height="17" rx="2"/>
			            <path d="M3 9h18M8 2v3M16 2v3"/>
			        </svg>
			    </span>
			    <h2 class="text-lg font-bold tracking-tight">여행 날짜를 먼저 선택해 주세요</h2>
			    <p class="max-w-xs text-13 leading-relaxed text-muted">
			        시작·종료 날짜를 정하면<br />일자별로 장소를 담을 수 있어요.
			    </p>
			</div>
			
			<div id="empty_state" class="hidden flex flex-1 flex-col items-center justify-center gap-3 px-8 py-10 text-center">
				<span class="mb-1 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
					<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			          <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			          <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			          <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
			        </svg>
				</span>
				<h2 class="text-lg font-bold tracking-tight">아직 담은 장소가 없어요</h2>
				<p class="max-w-xs text-13 leading-relaxed text-muted">
					관심 관광지에서 장소를 담으면<br />지도 위에 동선이 자동으로 그려져요.
				</p>
				<button class="mt-2 inline-flex h-11 items-center gap-2 rounded-lg bg-brand px-6 text-sm font-semibold text-white transition hover:bg-brand-ink" id="addStopBtn">
					<span class="text-lg leading-none">＋</span> 장소 추가
				</button>
				<a href="/landmark/list" class="text-13 font-medium text-faint underline-offset-4 transition hover:text-muted hover:underline">
					관광지 둘러보기
				</a>
			</div>
			<div id="place_list" class="hidden flex-1 overflow-x-hidden overflow-y-auto px-5 py-4 flex flex-col gap-3"></div>
		</div>

		<!-- map -->
		<div class="relative" id="map"></div>
	</div>

	<div th:replace="~{views/common/kakao-map :: kakao-map}"></div>
	<div th:replace="~{views/common/modal :: modal}"></div>

<script th:inline="javascript">
const initialRaw = /*[[${scheduleJson}]]*/ null;
const initialData = initialRaw ? (typeof initialRaw === 'string' ? JSON.parse(initialRaw) : initialRaw) : null;

let selectedDate = null;

const changeTitle = () => {
    const title = document.getElementById('schedule_title');
    const input = document.getElementById('schedule_title_input');

    if (title.classList.contains('hidden')) {
        const value = input.value.trim() || '제목 없는 일정';
        title.textContent = value;

        if (value === '제목 없는 일정') {
            title.classList.remove('text-ink');
            title.classList.add('text-faint');
        } else {
            title.classList.remove('text-faint');
            title.classList.add('text-ink');
        }

        title.classList.remove('hidden');
        input.classList.add('hidden');
    } else {
        const current = title.textContent.trim();
        input.value = (current === '제목 없는 일정') ? '' : current;
        title.classList.add('hidden');
        input.classList.remove('hidden');
        input.focus();
    }
}

const onStartDateChange = (value) => {
    const label = document.getElementById('start_date_label');
    label.textContent = value;
    label.classList.remove('text-faint');
    label.classList.add('text-ink');

    const endInput = document.getElementById('end_date_input');
    endInput.min = value;

    if (endInput.value && endInput.value < value) {
        endInput.value = value;
        const endLabel = document.getElementById('end_date_label');
        endLabel.textContent = value;
        endLabel.classList.remove('text-faint');
        endLabel.classList.add('text-ink');
    }

    renderDayTabs();
}

const onEndDateChange = (value) => {
    const label = document.getElementById('end_date_label');
    label.textContent = value;
    label.classList.remove('text-faint');
    label.classList.add('text-ink');

    renderDayTabs();
}

const selectDay = (div, date) => {
    const container = document.getElementById('day_tabs');
    selectedDate = date;

    [...container.children].forEach(tab => {
        tab.className = 'min-w-20 cursor-pointer rounded-xl border border-line bg-white p-3 text-center transition hover:border-muted';
        tab.querySelector('span').className = 'text-xs text-muted tabular-nums';
    });
    div.className = 'min-w-20 rounded-xl border border-transparent bg-brand p-3 text-center text-white cursor-pointer';
    div.querySelector('span').className = 'text-xs text-white/75 tabular-nums';
    
    updateEmptyState();
    updateRegionBadge();
}

const renderDayTabs = () => {
    const startValue = document.getElementById('start_date_input').value;
    const endValue = document.getElementById('end_date_input').value;
    const container = document.getElementById('day_tabs');
    const tabArea = document.getElementById('day_tab_area');
    const tabEmpty = document.getElementById('day_tab_empty');
    const noDate = document.getElementById('empty_no_date');
    const emptyState = document.getElementById('empty_state');

    if (!startValue || !endValue) {
        tabArea.classList.add('hidden');
        tabEmpty.classList.remove('hidden');
        
        noDate.classList.remove('hidden');
        emptyState.classList.add('hidden');
        return;
    }

    tabArea.classList.remove('hidden');
    tabEmpty.classList.add('hidden');
    
    noDate.classList.add('hidden');
    emptyState.classList.remove('hidden');


    const start = new Date(startValue);
    const end = new Date(endValue);
    const dayCount = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

    container.innerHTML = '';

    let activeIndex = 0;
    if (selectedDate) {
        const diff = Math.round((selectedDate - start) / (1000 * 60 * 60 * 24));
        if (diff >= 0 && diff < dayCount) {
            activeIndex = diff;
        } else {
            selectedDate = null;
        }
    }

    if (!selectedDate) {
        selectedDate = new Date(start);
        activeIndex = 0;
    }

    for (let i = 0; i < dayCount; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);

        const month = date.getMonth() + 1;
        const day = date.getDate();
        const wd = weekdays[date.getDay()];

        const isActive = i === activeIndex;
        const div = document.createElement('div');
        div.className = isActive
            ? 'min-w-20 rounded-xl border border-transparent bg-brand p-3 text-center text-white cursor-pointer'
            : 'min-w-20 cursor-pointer rounded-xl border border-line bg-white p-3 text-center transition hover:border-muted';
        div.innerHTML = `
            <b class="block text-sm font-bold">DAY ${i + 1}</b>
            <span class="text-xs ${isActive ? 'text-white/75' : 'text-muted'} tabular-nums">${month}.${String(day).padStart(2, '0')} ${wd}</span>
        `;

        const capturedDate = new Date(date);
        div.addEventListener('click', () => selectDay(div, capturedDate));
        container.appendChild(div);
    }

    const prev = document.getElementById('tab_prev');
    const next = document.getElementById('tab_next');
    if (container.scrollWidth > container.clientWidth) {
        prev.classList.remove('hidden');
        next.classList.remove('hidden');
    } else {
        prev.classList.add('hidden');
        next.classList.add('hidden');
    }
    
    updateEmptyState();
}

const placesByDate = {};

const toDateKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

const addPlaceToDate=(place)=>{
	if (!selectedDate) {
        showToast('날짜 탭을 먼저 선택해 주세요.', false);
        return;
    }
    const key = toDateKey(selectedDate);
    if (!placesByDate[key]) placesByDate[key] = [];

    // 중복 방지
    const exists = placesByDate[key].some(p => p.contentId === place.contentId);
    if (exists) {
        showToast(`'${place.title}'은 이미 추가된 장소예요.`, false);
        return;
    }

    placesByDate[key].push(place);
    updateEmptyState();
}

const updateEmptyState=()=>{
	const startValue = document.getElementById('start_date_input').value;
    const endValue = document.getElementById('end_date_input').value;
    const hasDate = startValue && endValue;

    const noDate = document.getElementById('empty_no_date');
    const emptyState = document.getElementById('empty_state');
    const placeList = document.getElementById('place_list');

    if (!hasDate) {
        noDate.classList.remove('hidden');
        emptyState.classList.add('hidden');
        placeList.classList.add('hidden');
        updateRegionBadge();
        return;
    }

    const key = selectedDate ? toDateKey(selectedDate) : null;
    const places = key ? (placesByDate[key] || []) : [];

    noDate.classList.add('hidden');

    if (places.length === 0) {
        emptyState.classList.remove('hidden');
        emptyState.style.display = 'flex';
        placeList.classList.add('hidden');
    } else {
        emptyState.classList.add('hidden');
        emptyState.style.display = '';
        placeList.classList.remove('hidden');
        renderPlaceList(places, key);
    }
    
    updateRegionBadge();
    drawRoute();
}

const renderPlaceList = (places, dateKey) => {
    const container = document.getElementById('place_list');
    container.innerHTML = '';

    // 상단 제목
    const header = document.createElement('div');
    header.className = 'mb-4 flex items-center justify-between';
    header.innerHTML = `
        <h2 class="text-lg font-bold">DAY ${getCurrentDayNumber()}</h2>
        <span class="text-13 text-muted tabular-nums">${places.length}곳</span>
    `;
    container.appendChild(header);

    // 타임라인
    const timeline = document.createElement('div');
    timeline.className = 'relative';

    // 세로선
    if (places.length > 1) {
        const line = document.createElement('div');
        line.className = 'absolute left-6 top-3 w-0.5 bg-line';
        line.style.bottom = '2rem';
        timeline.appendChild(line);
    }

    places.forEach((place, idx) => {
        const row = document.createElement('div');
        row.className = 'relative flex gap-4 pb-4 min-w';
        row.innerHTML = `
            <div class="z-10 flex w-12 flex-none flex-col items-center">
                <span class="flex h-7.5 w-7.5 items-center justify-center rounded-full bg-brand text-13 font-bold text-white ring-4 ring-white">${idx + 1}</span>
            </div>
            <div class="flex-1 min-w-0 rounded-xl border border-line bg-white shadow-soft">
                <div class="flex items-center gap-3 px-4 py-3">
                    <div class="h-13 w-13 flex-none overflow-hidden rounded-lg border border-line bg-sunk thumb"></div>
                    <div class="flex-1 min-w-0">
                        <div class="text-15 font-bold truncate title"></div>
                        <div class="mt-0.5 text-xs text-muted truncate addr"></div>
                    </div>
                    <div class="flex flex-none flex-col gap-0.5 actions"></div>
                </div>
            </div>
        `;

        row.querySelector('.title').textContent = place.title;
        row.querySelector('.addr').textContent = place.addr1 || '';

        if (place.firstimage) {
            const img = document.createElement('img');
            img.src = place.firstimage;
            img.className = 'h-full w-full object-cover';
            row.querySelector('.thumb').appendChild(img);
        }

        const actions = row.querySelector('.actions');

        const upBtn = document.createElement('button');
        upBtn.className = 'flex h-5 w-6 items-center justify-center rounded border border-line bg-white text-muted transition hover:border-brand hover:text-brand';
        upBtn.innerHTML = '<svg viewBox="0 0 16 16" class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M8 11.5V5M5 8l3-3 3 3"/></svg>';
        upBtn.disabled = idx === 0;
        upBtn.addEventListener('click', () => movePlaceUp(dateKey, idx));

        const downBtn = document.createElement('button');
        downBtn.className = 'flex h-5 w-6 items-center justify-center rounded border border-line bg-white text-muted transition hover:border-brand hover:text-brand';
        downBtn.innerHTML = '<svg viewBox="0 0 16 16" class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M8 4.5V11M5 8l3 3 3-3"/></svg>';
        downBtn.disabled = idx === places.length - 1;
        downBtn.addEventListener('click', () => movePlaceDown(dateKey, idx));

        const delBtn = document.createElement('button');
        delBtn.className = 'flex h-5 w-6 items-center justify-center rounded border border-line bg-white text-muted transition hover:border-err hover:text-err';
        delBtn.innerHTML = '<svg viewBox="0 0 16 16" class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4.5 4.5l7 7M11.5 4.5l-7 7"/></svg>';
        delBtn.addEventListener('click', () => removePlace(dateKey, idx));

        actions.append(upBtn, downBtn, delBtn);

        timeline.appendChild(row);
    });

    container.appendChild(timeline);

    // 하단 장소 추가 버튼
    const addBtn = document.createElement('button');
    addBtn.className = 'mt-3 flex h-12 w-full items-center justify-center gap-2 rounded-xl border-2 border-dashed border-line font-semibold text-muted transition hover:border-brand hover:text-brand';
    addBtn.innerHTML = '<span class="text-lg">＋</span> 장소 추가';
    addBtn.onclick = () => document.getElementById('addStopBtn').click();
    container.appendChild(addBtn);
}

const movePlaceUp = (dateKey, idx) => {
    if (idx === 0) return;
    const arr = placesByDate[dateKey];
    [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
    updateEmptyState();
}

const movePlaceDown = (dateKey, idx) => {
    const arr = placesByDate[dateKey];
    if (idx === arr.length - 1) return;
    [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
    updateEmptyState();
}

const removePlace = (dateKey, idx) => {
    placesByDate[dateKey].splice(idx, 1);
    updateEmptyState();
}

const getCurrentDayNumber = () => {
    const startValue = document.getElementById('start_date_input').value;
    if (!startValue || !selectedDate) return 1;
    const start = new Date(startValue);
    return Math.round((selectedDate - start) / (1000 * 60 * 60 * 24)) + 1;
}

const scrollTabs = (direction) => {
    const container = document.getElementById('day_tabs');
    container.scrollBy({ left: direction * 120, behavior: 'smooth' });
}

document.getElementById('day_tabs').addEventListener('wheel', (e) => {
    e.preventDefault();
    document.getElementById('day_tabs').scrollLeft += e.deltaY;
});


const REGION_MAP = {
	    '서울': '서울', '부산': '부산', '대구': '대구', '인천': '인천',
	    '광주': '광주', '대전': '대전', '울산': '울산', '세종': '세종',
	    '경기': '경기', '강원': '강원', '제주': '제주',
	    '충청북도': '충북', '충청남도': '충남',
	    '전라북도': '전북', '전라남도': '전남',
	    '경상북도': '경북', '경상남도': '경남',
	    '충북': '충북', '충남': '충남', '전북': '전북', '전남': '전남',
	    '경북': '경북', '경남': '경남', '강원특별자치도': '강원',
	    '제주특별자치도': '제주', '전북특별자치도': '전북'
};

const extractRegion = (addr1) => {
    if (!addr1) return null;
    const head = addr1.trim().split(' ')[0];

    const keys = Object.keys(REGION_MAP).sort((a, b) => b.length - a.length);
    for (const key of keys) {
        if (head.startsWith(key)) return REGION_MAP[key];
    }
    return null;
};

const updateRegionBadge = () => {
    const badge = document.getElementById('region_badge');

    const MISO = 'inline-flex h-7.5 items-center rounded-full border border-dashed border-line bg-white px-3 text-13 font-medium text-faint';
    const DONE = 'inline-flex h-7.5 items-center rounded-full border border-brand bg-brand-soft px-3 text-13 font-semibold text-brand-ink';

    const regions = new Set();
    Object.values(placesByDate).forEach(places => {
        places.forEach(p => {
            const r = extractRegion(p.addr1);
            if (r) regions.add(r);
        });
    });

    if (regions.size === 0) {
        badge.textContent = '지역 미정';
        badge.className = MISO;
    } else if (regions.size === 1) {
        badge.textContent = [...regions][0];
        badge.className = DONE;
    } else {
        badge.textContent = `${[...regions][0]} 외 ${regions.size - 1}곳`;
        badge.className = DONE;
    }
};





////////////저장

const saveSchedule = async () => {
    const title = document.getElementById('schedule_title').textContent.trim();
    const startDate = document.getElementById('start_date_input').value;
    const endDate = document.getElementById('end_date_input').value;

    if (!startDate || !endDate) {
        showToast('여행 날짜를 선택해 주세요.', false);
        return;
    }

    const places = [];
    Object.keys(placesByDate).forEach(dateKey => {
        placesByDate[dateKey].forEach((place, idx) => {
            places.push({
                scheduleSubDate: dateKey,
                scheduleSubSeq: idx + 1,
                contentId: place.contentId
            });
        });
    });

    if (places.length === 0) {
        showToast('장소를 한 곳 이상 담아 주세요.', false);
        return;
    }

    const payload = {
   	    scheduleTitle: title,
   	    scheduleStartdate: startDate,
   	    scheduleEnddate: endDate,
   	    places: places
   	};
    
    if (initialData && initialData.scheduleNo) {
        payload.scheduleNo = initialData.scheduleNo;
    }
    
    
    try {
    	//console.log(payload);
        const res = await fetch('/schedule/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (handleNeedLogin(data)) return;
        if (data.success) {
            showToast('일정이 저장되었어요.');
            location.href = '/schedule/list';
        } else {
            showToast(data.message || '저장에 실패했어요.', false);
        }
    } catch (e) {
        showToast('저장 중 오류가 발생했어요.', false);
    }
};



////////불러오기

const restoreSchedule = (data) => {
    const title = document.getElementById('schedule_title');
    if (data.scheduleTitle && data.scheduleTitle !== '제목 없는 일정') {
        title.textContent = data.scheduleTitle;
        title.classList.remove('text-faint');
        title.classList.add('text-ink');
    }

    const startInput = document.getElementById('start_date_input');
    const endInput = document.getElementById('end_date_input');
    startInput.value = data.scheduleStartdate;
    endInput.value = data.scheduleEnddate;

    const startLabel = document.getElementById('start_date_label');
    startLabel.textContent = data.scheduleStartdate;
    startLabel.classList.remove('text-faint');
    startLabel.classList.add('text-ink');

    const endLabel = document.getElementById('end_date_label');
    endLabel.textContent = data.scheduleEnddate;
    endLabel.classList.remove('text-faint');
    endLabel.classList.add('text-ink');

    Object.keys(data.placesByDate).forEach(dateKey => {

    renderDayTabs();

    updateEmptyState();

};

////////////지도 렌더링

//기존 마커/폴리라인 제거
const clearMap = () => {
 markers.forEach(m => m.setMap(null));
 polylines.forEach(p => p.setMap(null));
 markers = [];
 polylines = [];
};

//선택된 날짜의 장소들을 마커 + 실도로 경로로 그림
const drawRoute = async () => {
 if (!mapReady || !map) return;   // 지도 준비 전이면 대기
 clearMap();

 const key = selectedDate ? toDateKey(selectedDate) : null;
 const places = key ? (placesByDate[key] || []) : [];

 if (places.length === 0) return;

 const bounds = new kakao.maps.LatLngBounds();

 // 1) 마커 + 순번 라벨
 places.forEach((place, idx) => {
     const lat = parseFloat(place.mapy);   // 위도
     const lng = parseFloat(place.mapx);   // 경도
     if (isNaN(lat) || isNaN(lng)) return;

     const pos = new kakao.maps.LatLng(lat, lng);

     const marker = new kakao.maps.Marker({ position: pos, map });
     markers.push(marker);

     // 순번 표시용 커스텀 오버레이
     const overlay = new kakao.maps.CustomOverlay({
         position: pos,
         yAnchor: 2.1,
         content: `<div style="background:#2563eb;color:#fff;width:22px;height:22px;`
                + `border-radius:50%;display:flex;align-items:center;justify-content:center;`
                + `font-size:12px;font-weight:700;border:2px solid #fff;`
                + `box-shadow:0 1px 3px rgba(0,0,0,.3)">${idx + 1}</div>`
     });
     overlay.setMap(map);
     markers.push(overlay);   // 같이 정리되도록 markers에 넣음

     bounds.extend(pos);
 });

 map.setBounds(bounds);

 // 2) 장소 2곳 이상이면 실도로 경로
 if (places.length >= 2) {
     await drawRoadPath(places);
 }
};

//실도로 경로: 서버 프록시 호출 → vertexes로 폴리라인
const drawRoadPath = async (places) => {
 // 좌표 유효한 것만 추림
 const points = places
     .map(p => ({ lat: parseFloat(p.mapy), lng: parseFloat(p.mapx) }))
     .filter(p => !isNaN(p.lat) && !isNaN(p.lng));

 if (points.length < 2) return;

 // 경유지 최대 5개 → 한 호출에 최대 7개 지점. 초과 시 구간 분할.
 const MAX_POINTS_PER_CALL = 7;
 const segments = [];
 for (let i = 0; i < points.length - 1; i += (MAX_POINTS_PER_CALL - 1)) {
     const slice = points.slice(i, i + MAX_POINTS_PER_CALL);
     if (slice.length >= 2) segments.push(slice);
 }

 for (const seg of segments) {
     try {
         const res = await fetch('/schedule/route', {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ points: seg })
         });
         if (!res.ok) throw new Error('route ' + res.status);
         const data = await res.json();
		
         const linePath = (data.path || []).map(
             c => new kakao.maps.LatLng(c.lat, c.lng)
         );
         if (linePath.length < 2) continue;

         const polyline = new kakao.maps.Polyline({
             path: linePath,
             strokeWeight: 5,
             strokeColor: '#2563eb',
             strokeOpacity: 0.85,
             strokeStyle: 'solid'
         });
         polyline.setMap(map);
         polylines.push(polyline);
     } catch (e) {
         console.error('경로 표시 실패', e);
         // 실패한 구간은 직선 fallback (이게 없으면 동선이 끊겨 보임)
         const fallback = new kakao.maps.Polyline({
             path: seg.map(p => new kakao.maps.LatLng(p.lat, p.lng)),
             strokeWeight: 4,
             strokeColor: '#94a3b8',
             strokeOpacity: 0.7,
             strokeStyle: 'shortdash'
         });
         fallback.setMap(map);
         polylines.push(fallback);
     }
 }
};

const confirmDelete = () => {
    // 새 일정(저장 전)이면 삭제할 게 없음
    if (!initialData || !initialData.scheduleNo) {
        showToast('아직 저장되지 않은 일정이에요.', false);
        return;
    }

    openDangerModal(
        '이 일정을 삭제할까요?',
        '삭제한 일정은 되돌릴 수 없어요.',
        async () => {
            try {
                const res = await fetch('/schedule/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'scheduleNo=' + initialData.scheduleNo
                });
                const data = await res.json();
                if (handleNeedLogin(data)) return;
                if (data.success) {
                    showToast('일정이 삭제되었어요.');
                    location.href = '/schedule/list';
                } else {
                    showToast('삭제에 실패했어요.', false);
                }
            } catch (e) {
                showToast('삭제 중 오류가 발생했어요.', false);
            }
        }
    );
};



////////////공유 토글

//현재 공유 상태 (initialData에서 가져옴)
let currentVisibility = (initialData && initialData.scheduleVisibility) || 'N';

const updateShareButton = () => {
    const btn = document.getElementById('shareBtn');
    const text = document.getElementById('shareBtnText');
    if (!btn || !text) return;

    if (currentVisibility === 'Y') {
        text.textContent = '공유 해제';
        btn.className = 'inline-flex h-11 items-center gap-2 rounded-lg border border-brand bg-brand-soft px-4 text-sm font-semibold text-brand-ink transition hover:border-brand hover:bg-brand hover:text-white';
    } else {
        text.textContent = '공유 게시판에 게시';
        btn.className = 'inline-flex h-11 items-center gap-2 rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:border-brand hover:text-brand';
    }
};

const toggleShare = () => {
	if (!initialData || !initialData.scheduleNo) {
		showToast('먼저 일정을 저장해 주세요.', false);
		return;
	}

	const sharing = (currentVisibility !== 'Y');   // 지금 'N'이면 공유하려는 것
	const title = sharing ? '이 일정을 공유할까요?' : '공유를 해제할까요?';
	const text = sharing ? '공유하면 다른 여행자들이 내 일정을 볼 수 있어요.' : '공유를 해제하면 게시판에서 내려가요.';
	
	openConfirmModal(title, text, async () => {
		try {
			const res = await fetch('/schedule/visibility', {
	             method: 'POST',
	             headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	             body: 'scheduleNo=' + initialData.scheduleNo
			});
			const data = await res.json();
			if (handleNeedLogin(data)) return;
			if (data.success) {
				currentVisibility = data.visibility;
				updateShareButton();
				showToast(data.visibility === 'Y' ? '일정을 공유했어요.' : '공유를 해제했어요.');
			} else {
				showToast(data.message || '변경에 실패했어요.', false);
			}
		} catch (e) {
			showToast('변경 중 오류가 발생했어요.', false);
		}
	});
};


const handleNeedLogin = (data) => {
    if (data && data.needLogin) {
        const back = encodeURIComponent(location.pathname + location.search);
        showToast('로그인이 필요해요. 로그인 페이지로 이동할게요.', false);
        setTimeout(() => {
            location.href = '/member/login?targetUrl=' + back;
        }, 800);
        return true;
    }
    return false;
};

if (initialData) {
    restoreSchedule(initialData);
}

if (!initialData || !initialData.scheduleNo) {
    const delBtn = document.getElementById('deleteBtn');
    if (delBtn) {
        delBtn.disabled = true;
        delBtn.classList.add('cursor-not-allowed', 'opacity-40');
    }
}

updateShareButton();
</script>
