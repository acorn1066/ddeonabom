<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body>
	<div th:replace="~{views/common/navbar :: navbar}"></div>

	<main class="mx-auto max-w-wide px-6">
		<div class="flex items-end justify-between pb-5 pt-12">
			<div>
				<span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">일정 플래너</span>
				<h1 class="mt-2 text-h2 font-extrabold tracking-tight">내 일정</h1>
			</div>
		</div>

		<div class="flex items-center gap-2 border-b border-line pb-5">
			<span data-filter="all" onclick="filterSchedules(this)"
			      class="filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white">
				전체 [[${mainNum}]]
			</span> 
			<span th:if="${showNum > 0}" data-filter="Y" onclick="filterSchedules(this)"
			      class="filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">
				전체공개 [[${showNum}]]
			</span> 
			<span th:if="${showNum > 0}" data-filter="Y" onclick="filterSchedules(this)"
			      class="filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">
				회원공개 [[${memberNum}]]
			</span>
			<span th:if="${hideNum > 0}" data-filter="N" onclick="filterSchedules(this)"
			      class="filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">
				비공개 [[${hideNum}]]
			</span>
			<div th:if="${showNum > 0}" class="ml-auto">
				<select class="h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none">
					<option>최근수정순</option>
					<option>여행일순</option>
					<option>이름순</option>
				</select>
			</div>
		</div>

		<!-- 비로그인유저 -->
		<div class="flex flex-col items-center justify-center gap-3 px-5 py-24 text-center" th:if="${isLogin eq 'N'}">
			<span class="mb-2 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
				<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			        <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			        <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			        <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
		      	</svg>
			</span>
			<h3 class="text-22 font-bold tracking-tight">로그인을 해야 볼 수 있어요</h3>
			<a href="/member/login" class="mt-3 inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
				로그인
			</a> 
		</div>


		<!-- 일정 없을때 -->
		<div class="flex flex-col items-center justify-center gap-3 px-5 py-24 text-center" th:if="${isLogin eq 'Y' && mainNum==0}">
			<span class="mb-2 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
				<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			        <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			        <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			        <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
		      	</svg>
			</span>
			<h3 class="text-22 font-bold tracking-tight">아직 그린 길이 없어요</h3>
			<p class="max-w-sm text-15 leading-relaxed text-muted">첫 여행 일정을 만들어보세요.</p>
			<a href="/schedule/new" class="mt-3 inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
				첫 일정 만들기
			</a> 
			<a href="/landmark/list" class="text-13 font-medium text-faint underline-offset-4 transition hover:text-muted hover:underline">
				관광지 먼저 둘러보기
			</a>
		</div>
		
		<!-- 일정 있을때 -->
		<div class="grid grid-cols-3 gap-5 py-6" th:if="${isLogin eq 'Y' && mainNum > 0}">

	    <a href="/schedule/new" class="flex min-h-72 flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed border-line bg-sunk text-center text-muted transition hover:border-brand hover:bg-brand-soft hover:text-brand">
	        <span class="flex h-13 w-13 items-center justify-center rounded-full bg-white text-2xl shadow-soft">＋</span>
	        <b class="text-base font-bold">새 일정 만들기</b>
	        <span class="text-13">관심 관광지를 끌어와 동선을 그려보세요</span>
	    </a>
	
	    <div th:each="schedule : ${scheduleList}"
	         th:attr="data-visibility=${schedule.scheduleVisibility}"
	         class="schedule-card flex flex-col overflow-hidden rounded-xl border border-line bg-white shadow-soft">
	
	        <a th:href="@{/schedule/detail/{no}(no=${schedule.scheduleNo})}" class="relative block aspect-video overflow-hidden">
	            <div class="absolute inset-0" style="background: linear-gradient(to right, rgba(120,140,90,0.07) 1px, transparent 1px) 0 0/22px 22px, linear-gradient(to bottom, rgba(120,140,90,0.07) 1px, transparent 1px) 0 0/22px 22px, #EEF3E9;"></div>
	            <svg viewBox="0 0 160 100" preserveAspectRatio="xMidYMid slice" class="route-svg absolute inset-0 h-full w-full text-brand" th:attr="data-coords=${schedule.coords}">
				    <path class="route-line" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
				</svg>

	            <!-- 지역 배지 (첫 장소 주소 기반) -->
	            <span th:if="${schedule.firstAddr != null}" class="region-badge absolute bottom-2 left-2 rounded-full bg-white/85 px-2.5 py-0.5 text-[11.5px] font-semibold text-muted backdrop-blur-sm" th:attr="data-addr=${schedule.firstAddr}">지역</span>
	            <!-- 공유/비공개 뱃지 -->
				<span th:if="${schedule.scheduleVisibility == 'N'}"
				      class="vis-badge absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full bg-ink text-white px-3 text-xs font-medium">비공개</span>
				<span th:if="${schedule.scheduleVisibility == 'M'}"
				      class="vis-badge absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full bg-slate-500 text-white px-3 text-xs font-medium">회원공개</span>
				<span th:if="${schedule.scheduleVisibility == 'Y'}"
				      class="vis-badge absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full bg-brand text-white px-3 text-xs font-medium">전체공개</span>
	        </a>
	
	        <a th:href="@{/schedule/detail/{no}(no=${schedule.scheduleNo})}" class="block p-4">
	            <div class="text-17 font-bold" th:text="${schedule.scheduleTitle}">제목</div>
	            <div class="mt-1 text-13 text-muted tabular-nums" th:text="${schedule.scheduleStartdate} + ' — ' + ${schedule.scheduleEnddate}">날짜</div>
	            <div class="mt-3 flex gap-4 text-13 text-muted">
	                <span><b class="font-bold text-ink tabular-nums" th:text="${schedule.placeCount}">0</b>곳</span>
	                <!-- 좋아요: 공유된 일정만 표시 (좋아요 테이블 생기면 매퍼 likeCount 한 줄 살리면 실값) -->
	                <span th:if="${schedule.scheduleVisibility == 'Y'}">♥ <b class="font-bold text-ink tabular-nums" th:text="${schedule.likeCount}">0</b></span>
	            </div>
	        </a>
	
	        <div class="mt-auto flex border-t border-line">
			    <button th:onclick="|toggleShare(${schedule.scheduleNo}, this)|"
			            th:attr="data-visibility=${schedule.scheduleVisibility}"
			            class="share-btn flex h-11 flex-1 items-center justify-center gap-1.5 text-13 font-semibold text-muted transition hover:bg-sunk hover:text-ink">
			        <svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5">
			            <circle cx="4" cy="8" r="1.6" />
			            <circle cx="12" cy="4" r="1.6" />
			            <circle cx="12" cy="12" r="1.6" />
			            <path d="M5.4 7.2 10.6 4.6 M5.4 8.8 10.6 11.4" />
			        </svg>
			        <span class="share-btn-text">공유</span>
			    </button>
			    <button onclick="reviewComingSoon()" class="flex h-11 flex-1 items-center justify-center gap-1.5 border-l border-line text-13 font-semibold text-muted transition hover:bg-sunk hover:text-ink">
			        <svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v7H8l-3 3v-3H3z" /></svg>
			        후기
			    </button>
			    <button th:onclick="|deleteSchedule(${schedule.scheduleNo})|" class="flex h-11 flex-1 items-center justify-center gap-1.5 border-l border-line text-13 font-semibold text-muted transition hover:bg-red-50 hover:text-err">
			        <svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5">
			            <path d="M3 5h10M6.5 5V3.5h3V5M5 5l.6 8h4.8L11 5" />
			        </svg>
			        삭제
			    </button>
			</div>
	    </div>
	
	</div>
	</main>

	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
	
<script>
const deleteSchedule = (scheduleNo) => {
    openDangerModal(
        '이 일정을 삭제할까요?',
        '삭제한 일정은 목록에서 사라져요.',
        async () => {
            try {
                const res = await fetch('/schedule/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'scheduleNo=' + scheduleNo
                });
                const data = await res.json();
                if (handleNeedLogin(data)) return;
                if (data.success) {
                    showToast('일정이 삭제되었어요.');
                    setTimeout(() => location.reload(), 800);
                } else {
                    showToast(data.message || '삭제에 실패했어요.', false);
                }
            } catch (e) {
                showToast('삭제 중 오류가 발생했어요.', false);
            }
        },
        '삭제'
    );
};


const filterSchedules = (tab) => {
    const filter = tab.dataset.filter;

    document.querySelectorAll('.filter-tab').forEach(t => {
        const active = t === tab;
        t.className = active
            ? 'filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white'
            : 'filter-tab inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink';
    });

    document.querySelectorAll('.schedule-card').forEach(card => {
        const vis = card.dataset.visibility;
        const show = (filter === 'all') || (vis === filter);
        card.style.display = show ? '' : 'none';
    });
};

const REGION_MAP = {
    '서울': '서울', '부산': '부산', '대구': '대구', '인천': '인천',
    '광주': '광주', '대전': '대전', '울산': '울산', '세종': '세종',
    '경기': '경기', '강원': '강원', '제주': '제주',
    '충청북도': '충북', '충청남도': '충남',
    '전라북도': '전북', '전라남도': '전남',
    '경상북도': '경북', '경상남도': '경남',
    '충북': '충북', '충남': '충남', '전북': '전북', '전남': '전남',
    '경북': '경북', '경남': '경남', '강원특별자치도': '강원',
    '제주특별자치도': '제주', '전북특별자치도': '전북'
};

const extractRegion = (addr1) => {
    if (!addr1) return null;
    const head = addr1.trim().split(' ')[0];
    const keys = Object.keys(REGION_MAP).sort((a, b) => b.length - a.length);
    for (const key of keys) {
        if (head.startsWith(key)) return REGION_MAP[key];
    }
    return null;
};

const shortenRegionBadges = () => {
    document.querySelectorAll('.region-badge').forEach(badge => {
        const addr = badge.dataset.addr;
        const region = extractRegion(addr);
        if (region) {
            badge.textContent = region;
        } else {
            // 매핑 못 찾으면 첫 단어라도 (혹은 숨김)
            badge.textContent = addr ? addr.split(' ')[0] : '';
        }
    });
};
	
	
const drawRoutes = () => {
    document.querySelectorAll('.route-svg').forEach(svg => {
        const raw = svg.dataset.coords;
        if (!raw) return;

        const points = raw.split(';').map(pair => {
            const [x, y] = pair.split(',').map(Number);
            return [x, y];
        }).filter(p => !isNaN(p[0]) && !isNaN(p[1]));

        if (points.length === 0) return;

        const xs = points.map(p => p[0]);
        const ys = points.map(p => p[1]);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);

        const PAD = 20, W = 160, H = 100;
        const rangeX = maxX - minX || 1;
        const rangeY = maxY - minY || 1;

        const scaled = points.map(([x, y]) => {
            const sx = (maxX === minX) ? W / 2 : PAD + ((x - minX) / rangeX) * (W - PAD * 2);
            const sy = (maxY === minY) ? H / 2 : PAD + (1 - (y - minY) / rangeY) * (H - PAD * 2);
            return [sx, sy];
        });

        const d = scaled.map((p, i) =>
            (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)
        ).join(' ');

        const line = svg.querySelector('.route-line');
        if (line) line.setAttribute('d', d);

        scaled.forEach(([x, y], i) => {
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', x.toFixed(1));
            c.setAttribute('cy', y.toFixed(1));
            const isEnd = (i === 0 || i === scaled.length - 1);
            c.setAttribute('r', isEnd ? '4.2' : '3');
            if (isEnd) {
                c.setAttribute('fill', 'currentColor');
            } else {
                c.setAttribute('fill', '#fff');
                c.setAttribute('stroke', 'currentColor');
                c.setAttribute('stroke-width', '1.7');
            }
            svg.appendChild(c);
        });
    });
}

const toggleShare = (scheduleNo, btn) => {
    const card = btn.closest('.schedule-card');
    const cur = btn.dataset.visibility;

    openVisibilityModal(cur, async (selected) => {
        if (selected === cur) return;
        try {
            const res = await fetch('/schedule/visibility', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'scheduleNo=' + scheduleNo + '&visibility=' + selected
            });
            const data = await res.json();
            if (handleNeedLogin(data)) return;
            if (data.success) {
                const vis = data.visibility;
                btn.dataset.visibility = vis;
                btn.querySelector('.share-btn-text').textContent = shareBtnLabel(vis);
                updateCardBadge(card, vis);
                card.dataset.visibility = vis;
                const msg = { Y: '전체 공개로 설정했어요.', M: '회원 공개로 설정했어요.', N: '공유를 해제했어요.' };
                showToast(msg[vis] || '변경했어요.');
            } else {
                showToast(data.message || '변경에 실패했어요.', false);
            }
        } catch (e) {
            showToast('변경 중 오류가 발생했어요.', false);
        }
    });
};

const shareBtnLabel = (vis) => {
    if (vis === 'Y') return '전체공개 중';
    if (vis === 'M') return '회원공개 중';
    return '공유';
};

const updateCardBadge = (card, vis) => {
    const badge = card.querySelector('.vis-badge');
    if (!badge) return;
    const map = {
        Y: { text: '전체공개',  cls: 'bg-brand' },
        M: { text: '회원공개', cls: 'bg-slate-500' },
        N: { text: '비공개',  cls: 'bg-ink' },
    };
    const { text, cls } = map[vis] || map['N'];
    badge.textContent = text;
    badge.className = `vis-badge absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full ${cls} text-white px-3 text-xs font-medium`;
};

const initShareButtons = () => {
    document.querySelectorAll('.share-btn').forEach(btn => {
        btn.querySelector('.share-btn-text').textContent = shareBtnLabel(btn.dataset.visibility);
    });
};

const handleNeedLogin = (data) => {
    if (data && data.needLogin) {
        const back = encodeURIComponent(location.pathname + location.search);
        showToast('로그인이 필요해요. 로그인 페이지로 이동할게요.', false);
        setTimeout(() => {
            location.href = '/member/login?targetUrl=' + back;
        }, 800);
        return true;
    }
    return false;
};

document.addEventListener('DOMContentLoaded', initShareButtons);
document.addEventListener('DOMContentLoaded', shortenRegionBadges);
document.addEventListener('DOMContentLoaded', drawRoutes);
</script>
</body>
</html>
