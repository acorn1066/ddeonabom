<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body>
	<div th:replace="~{views/common/navbar :: navbar}"></div>

	<main class="mx-auto max-w-wide px-6">
		<div class="flex items-end justify-between pb-5 pt-12">
			<div>
				<span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">일정 플래너</span>
				<h1 class="mt-2 text-h2 font-extrabold tracking-tight">내 일정</h1>
			</div>
		</div>

		<div class="flex items-center gap-2 border-b border-line pb-5">
			<span class="inline-flex h-9 cursor-pointer items-center rounded-full border border-ink bg-ink px-4 text-13 font-semibold text-white">
				전체 [[${mainNum}]]
			</span> 
			<span th:if="${showNum}>0" class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">
				공유됨 [[${showNum}]]
			</span> 
			<span th:if="${hideNum}>0" class="inline-flex h-9 cursor-pointer items-center rounded-full border border-line bg-white px-4 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">
				비공개 [[${hideNum}]]
			</span>
			<div th:if="${showNum}>0" class="ml-auto">
				<select class="h-9 rounded-lg border border-line bg-white px-3 text-13 font-semibold text-ink outline-none">
					<option>최근수정순</option>
					<option>여행일순</option>
					<option>이름순</option>
				</select>
			</div>
		</div>

		<!-- 비로그인유저 -->
		<div class="flex flex-col items-center justify-center gap-3 px-5 py-24 text-center" th:if="${isLogin eq 'N'}">
			<span class="mb-2 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
				<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			        <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			        <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			        <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
		      	</svg>
			</span>
			<h3 class="text-22 font-bold tracking-tight">로그인을 해야 볼 수 있어요</h3>
			<a href="/schedule/new" class="mt-3 inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
				로그인
			</a> 
		</div>


		<!-- 일정 없을때 -->
		<div class="flex flex-col items-center justify-center gap-3 px-5 py-24 text-center" th:if="${isLogin eq 'Y' && mainNum==0}">
			<span class="mb-2 flex h-16 w-16 items-center justify-center rounded-full bg-sunk text-faint">
				<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			        <path d="M5 18 Q 9 8, 13 12 T 19 6" />
			        <circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none" />
			        <circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none" />
		      	</svg>
			</span>
			<h3 class="text-22 font-bold tracking-tight">아직 그린 길이 없어요</h3>
			<p class="max-w-sm text-15 leading-relaxed text-muted">첫 여행 일정을 만들어보세요.</p>
			<a href="/schedule/new" class="mt-3 inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink">
				첫 일정 만들기
			</a> 
			<a href="/landmark/list" class="text-13 font-medium text-faint underline-offset-4 transition hover:text-muted hover:underline">
				관광지 먼저 둘러보기
			</a>
		</div>
		
		<!-- 일정 있을때 -->
		<div class="grid grid-cols-3 gap-5 py-6" th:if="${isLogin eq 'Y' && mainNum>0}"> <!-- th:if="${isLogin eq 'Y' && mainNum==0}" --> 
			<a href="/schedule/new" class="flex min-h-72 flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed border-line bg-sunk text-center text-muted transition hover:border-brand hover:bg-brand-soft hover:text-brand">
				<span class="flex h-13 w-13 items-center justify-center rounded-full bg-white text-2xl shadow-soft">＋</span>
				<b class="text-base font-bold">새 일정 만들기</b> <span class="text-13">관심 관광지를 끌어와 동선을 그려보세요</span>
			</a>

			<div class="flex flex-col overflow-hidden rounded-xl border border-line bg-white shadow-soft">
				<a href="itinerary.html" class="relative block aspect-video overflow-hidden">
					<div class="absolute inset-0" style="background: linear-gradient(to right, #E1E5EE 1px, transparent 1px) 0 0/26px 26px, linear-gradient(to bottom, #E1E5EE 1px, transparent 1px) 0 0/26px 26px, #EEF1F6;"></div>
						<svg viewBox="0 0 160 100" preserveAspectRatio="xMidYMid slice" class="absolute inset-0 h-full w-full text-brand">
					        <path d="M22 28.2 L53.1 78 L87.1 59.3 L121 22 L138 71.8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
					        <circle cx="22" cy="28.2" r="4.2" fill="currentColor" />
					        <circle cx="53.1" cy="78" r="3" fill="#fff" stroke="currentColor" stroke-width="1.7" />
					        <circle cx="87.1" cy="59.3" r="3" fill="#fff" stroke="currentColor" stroke-width="1.7" />
					        <circle cx="121" cy="22" r="3" fill="#fff" stroke="currentColor" stroke-width="1.7" />
					        <circle cx="138" cy="71.8" r="4.2" fill="currentColor" />
				      </svg> 
			    	<span class="absolute bottom-2 left-2 rounded-full bg-white/85 px-2.5 py-0.5 text-[11.5px] font-semibold text-muted backdrop-blur-sm">
			    		제주 동쪽
			    	</span> 
					<span class="absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full bg-brand text-white px-3 text-xs font-medium">공유됨</span>
				</a> 
				<a href="itinerary.html" class="block p-4">
					<div class="text-17 font-bold">제주 동쪽 한 바퀴</div>
					<div class="mt-1 text-13 text-muted tabular-nums">2026.04.10 — 04.13 · 3박 4일</div>
					<div class="mt-3 flex gap-4 text-13 text-muted">
						<span><b class="font-bold text-ink tabular-nums">12</b>곳</span>
						<span>♥<b class="font-bold text-ink tabular-nums">184</b></span>
					</div>
				</a>
				<div class="mt-auto flex border-t border-line">
					<button class="flex h-11 flex-1 items-center justify-center gap-1.5 text-13 font-semibold text-muted transition hover:bg-sunk hover:text-ink">
						<svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5">
							<circle cx="4" cy="8" r="1.6" />
							<circle cx="12" cy="4" r="1.6" />
							<circle cx="12" cy="12" r="1.6" />
							<path d="M5.4 7.2 10.6 4.6 M5.4 8.8 10.6 11.4" />
						</svg>
						공유
					</button>
					<button class="flex h-11 flex-1 items-center justify-center gap-1.5 border-l border-line text-13 font-semibold text-muted transition hover:bg-sunk hover:text-ink">
						<svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5"> <path d="M3 3h10v7H8l-3 3v-3H3z" /></svg>
						후기
					</button>
					<button class="flex h-11 flex-1 items-center justify-center gap-1.5 border-l border-line text-13 font-semibold text-muted transition hover:bg-red-50 hover:text-err">
						<svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5"> <path d="M3 5h10M6.5 5V3.5h3V5M5 5l.6 8h4.8L11 5" /></svg>
						삭제
					</button>
				</div>
			</div>
			<!-- 빈 일정 (0곳) — 사진·동선 없는 상태 -->
			<div class="flex flex-col overflow-hidden rounded-xl border border-line bg-white shadow-soft">
				<a href="itinerary.html" class="relative block aspect-video overflow-hidden">
					<div class="absolute inset-0" style="background: linear-gradient(to right, #E9ECF3 1px, transparent 1px) 0 0/26px 26px, linear-gradient(to bottom, #E9ECF3 1px, transparent 1px) 0 0/26px 26px, #F4F6FA;"></div>
					<svg viewBox="0 0 160 100" preserveAspectRatio="xMidYMid slice" class="absolute inset-0 h-full w-full">
				        <path d="M34 70 Q 80 30 126 52" fill="none" stroke="#C5CBD8" stroke-width="2" stroke-linecap="round" stroke-dasharray="1.5 8" />
				        <circle cx="34" cy="70" r="3.6" fill="#F4F6FA" stroke="#C5CBD8" stroke-width="1.6" />
				        <circle cx="126" cy="52" r="3.6" fill="#F4F6FA" stroke="#C5CBD8" stroke-width="1.6" />
					</svg>
					<div class="absolute inset-0 flex flex-col items-center justify-center gap-0.5">
						<b class="text-13 font-bold text-muted">아직 동선이 없어요</b> 
						<span class="text-[11.5px] text-faint">관광지를 끌어와 길을 그려보세요</span>
					</div> 
					<span class="absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full border border-line bg-white text-muted px-3 text-xs font-medium">
						작성 중
					</span>
					<!-- <span class="absolute left-2.5 top-2.5 inline-flex h-7 items-center rounded-full bg-ink text-white px-3 text-xs font-medium">비공개</span> -->
				</a> 
				<a href="itinerary.html" class="block p-4">
					<div class="text-17 font-bold">남해 가을 드라이브</div>
					<div class="mt-1 text-13 text-muted tabular-nums">날짜 미정</div>
					<div class="mt-3 flex gap-4 text-13 text-muted">
						<span><b class="font-bold text-ink tabular-nums">0</b>곳</span>
					</div>
				</a>
				<div class="mt-auto flex border-t border-line">
					<button class="flex h-11 flex-1 items-center justify-center gap-1.5 border-line text-13 font-semibold text-muted transition hover:bg-red-50 hover:text-err">
						<svg viewBox="0 0 16 16" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5">
							<path d="M3 5h10M6.5 5V3.5h3V5M5 5l.6 8h4.8L11 5" />
						</svg>
						삭제
					</button>
				</div>
			</div>
		</div>
	</main>





	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
</body>
</html>
