<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body>

<div th:replace="~{views/common/navbar :: navbar}"></div>

<main class="mx-auto max-w-post px-6 pb-24 pt-12">

    <!-- 브레드크럼 -->
    <div class="mb-5 text-13 text-muted">
        <a th:href="@{/qList/list}" class="hover:text-brand">질문 게시판</a>
        <span>› 공지</span>
    </div>

    <!-- 헤더 -->
    <div class="border-b border-line pb-5">

        <!-- 공지 뱃지 -->
        <div class="mb-3">
            <span class="inline-flex h-7.5 items-center rounded-full border border-line px-3 text-13 font-medium text-muted">공지</span>
        </div>

        <!-- 제목 -->
        <h1 class="mb-4 text-28 font-extrabold leading-snug tracking-tight"th:text="${notice.title}"></h1>

        <!-- 작성자 -->
        <div class="flex items-center gap-2.5">

            <span class="flex h-9.5 w-9.5 items-center justify-center rounded-full bg-sunk font-bold text-muted"
                  th:text="${#strings.substring(notice.memberName,0,1)}">
            </span>

            <div>

                <div class="text-sm font-bold"
                     th:text="${notice.memberName}">
                </div>

                <div class="text-13 text-muted tabular-nums">
                    <span th:text="${#dates.format(notice.createDate,'yyyy.MM.dd')}"></span>
                </div>

                <div th:if="${notice.modifyDate != null}"
                     class="text-13 text-muted tabular-nums">

                    <span th:text="${#dates.format(notice.modifyDate,'yyyy.MM.dd')}"></span>
                    <span class="ml-1">수정됨</span>

                </div>

            </div>

        </div>

    </div>

    <!-- 본문 -->
    <div class="py-6 text-base leading-loose text-ink/85"
         th:text="${notice.content}"
         style="white-space: pre-wrap">
    </div>

</main>

<footer th:replace="~{views/common/footer :: footer}"></footer>

</body>
</html>
