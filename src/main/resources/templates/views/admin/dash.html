<!DOCTYPE html>
<html>
<head th:replace="~{views/common/head :: head}"></head>
<body>
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	
	<main class="flex">

    <!-- 사이드바 -->
    <div th:replace="~{views/admin/adminbar :: adminbar}"></div>

    <!-- 컨텐츠 -->
    <section class="flex-1 p-8 bg-gray-100">

        <h1 class="mb-8 text-3xl font-bold">
            관리자 대시보드
        </h1>

        <div class="grid grid-cols-2 gap-6">

            <!-- 총 회원 수 -->
            <div class="rounded-xl bg-white p-6 shadow-sm border">
                <p class="text-gray-500">총 회원 수</p>
                <p class="mt-3 text-4xl font-bold"
                   th:text="${memberCount}">
                    0
                </p>
            </div>

            <!-- 총 게시글 수 -->
            <div class="rounded-xl bg-white p-6 shadow-sm border">
                <p class="text-gray-500">총 게시글 수</p>
                <p class="mt-3 text-4xl font-bold"
                   th:text="${boardCount}">
                    0
                </p>
            </div>

            <!-- 총 댓글 수 -->
            <div class="rounded-xl bg-white p-6 shadow-sm border">
                <p class="text-gray-500">총 댓글 수</p>
                <p class="mt-3 text-4xl font-bold"
                   th:text="${replyCount}">
                    0
                </p>
            </div>

            <!-- 신고 건 수 -->
            <div class="rounded-xl bg-white p-6 shadow-sm border">
                <p class="text-gray-500">신고 건 수</p>
                <p class="mt-3 text-4xl font-bold text-red-500"
                   th:text="${reportCount}">
                    0
                </p>
            </div>

        </div>

    </section>

</main>
	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
</body>
</html>
