	<!DOCTYPE html>
	<html>
	<head th:replace="~{views/common/head :: head}"></head>
	<body>
	
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	
	<main class="flex min-h-screen bg-gray-100">
	
	    <!-- 사이드바 -->
	    <div th:replace="~{views/admin/adminbar :: adminbar}"></div>
	
	    <!-- 메인 컨텐츠 -->
	    <section class="flex-1 p-8">
	
	        <!-- 페이지 제목 -->
	        <div class="mb-8">
	            <h1 class="text-3xl font-bold">
	                게시글 관리
	            </h1>
	            <p class="mt-2 text-gray-500">
	                게시글 조회 및 관리
	            </p>
	        </div>
	
	        <!-- 검색 영역 -->
	        <div class="mb-6 rounded-xl border bg-white p-6 shadow-sm">
	
	            <h2 class="mb-4 text-lg font-semibold">
	                게시글 검색
	            </h2>
	
	            <div class="flex gap-3">
	
	                <select
	                    class="rounded-lg border px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
	                    <option>전체</option>
	                    <option>제목</option>
	                    <option>작성자</option>
	                </select>
	
	                <input
	                    type="text"
	                    placeholder="검색어를 입력하세요"
	                    class="flex-1 rounded-lg border px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
	
	                <button
	                    class="rounded-lg bg-blue-600 px-6 py-2 text-white hover:bg-blue-700">
	                    검색
	                </button>
	
	            </div>
	
	        </div>
	
	        <!-- 게시글 목록 -->
			<div class="rounded-xl border bg-white shadow-sm">
			
			    <!-- 목록 제목 -->
			    <div class="border-b p-4">
			        <h2 class="text-xl font-bold">게시글 목록</h2>
			    </div>
			
			    <!-- 테이블 헤더 -->
			    <div class="grid grid-cols-12 border-b bg-gray-50 p-4 font-semibold">
			
			        <div class="col-span-1 text-center">번호</div>
			        <div class="col-span-5 text-center">제목</div>
			        <div class="col-span-2 text-center">작성자</div>
			        <div class="col-span-2 text-center">작성일</div>
			        <div class="col-span-2 text-center">상태</div>
			
			    </div>
			
			    <!-- 데이터 영역 -->
			    <div class="p-16 text-center text-gray-400">
			
			        게시글 데이터가 표시되는 영역
			
			    </div>
			
			</div>
	
	    </section>
	
	</main>
	
	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
	
	</body>
	</html>
