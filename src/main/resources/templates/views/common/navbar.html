<div class="sticky top-0 z-50 h-header border-b border-line bg-white/80 backdrop-blur-md backdrop-saturate-150" th:fragment="navbar">
  <div class="mx-auto flex h-full max-w-wide items-center justify-between px-6 relative">
    <a href="/" class="flex items-center gap-2">
      <span class="text-xl font-extralight tracking-wide">떠나봄</span>
    </a>

    <nav class="flex items-center gap-8 text-sm font-medium text-muted">

      <a href="sites" class="py-2 transition-colors hover:text-ink">관광지</a>
      <a href="/schedule/list" class="relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand">일정 플래너</a>

      <a href="/landmark/list" class="py-2 transition-colors hover:text-ink">관광지</a>
      <a href="planner" class="relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand">일정 플래너</a>


    <nav class="absolute left-1/2 -translate-x-1/2 flex items-center gap-8 text-sm font-medium text-muted">
		<a th:href="@{/landmark/list}"
		   th:class="${currentURI != null and currentURI.contains('/landmark')} ? 
		     'relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand' : 
		     'relative py-2 transition-colors hover:text-ink'">관광지</a>
		
		<a th:href="@{/schedule/list}"
		   th:class="${currentURI != null and currentURI.contains('/schedule')} ? 
		     'relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand' : 
		     'relative py-2 transition-colors hover:text-ink'">일정 플래너</a>
		
		<a th:href="@{/share-board/list}"
		   th:class="${currentURI != null and currentURI.contains('/share-board')} ? 
		     'relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand' : 
		     'relative py-2 transition-colors hover:text-ink'">일정 공유</a>
		
		<a th:href="@{/reviews/list}"
		   th:class="${currentURI != null and currentURI.contains('/reviews')} ? 
		     'relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand' : 
		     'relative py-2 transition-colors hover:text-ink'">여행 후기</a>
		
		<a th:href="@{/qList/list}"
		   th:class="${currentURI != null and currentURI.contains('/qList')} ? 
		     'relative py-2 font-semibold text-ink after:absolute after:-bottom-0.5 after:left-0 after:right-0 after:h-0.5 after:rounded after:bg-brand' : 
		     'relative py-2 transition-colors hover:text-ink'">질문</a>
    </nav>
    
    <div class="flex items-center gap-3">
      <a href="/member/join" class="inline-flex h-9 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">회원가입</a>
      <a href="/member/login" class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">로그인</a>
    </div>
  </div>
</div>
