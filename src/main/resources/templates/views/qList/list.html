<!DOCTYPE html>
<html>
<head th:replace="~{views/common/head :: head}"></head>
<body>
	<div th:replace="~{views/common/navbar :: navbar}"></div>
	
	<!-- ════════════ MAIN ════════════ -->
	<main class="mx-auto max-w-board px-6 pb-24 pt-12">
	  <div class="mb-6 flex items-end justify-between">
	    <div>
	      <span class="inline-flex items-center gap-2 text-sm font-semibold text-brand before:h-0.5 before:w-4 before:rounded before:bg-brand">질문 게시판</span>
	      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">여행 전, 무엇이든 물어보세요</h1>
	      <p class="mt-2 text-15 text-muted">먼저 다녀온 여행자들이 답해드려요.</p>
	    </div>
	    <a href="write" class="inline-flex h-12 items-center rounded-lg bg-brand px-8 text-15 font-semibold text-white transition hover:bg-brand-ink" th:if="${session.loginUser != null}">질문하기</a>
	  </div>
	
	  <div class="flex items-center gap-2 border-b-2 border-ink pb-4">
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-transparent bg-brand px-3.5 text-13 font-semibold text-white">전체</span>
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-line bg-white px-3.5 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">교통·이동</span>
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-line bg-white px-3.5 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">숙소</span>
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-line bg-white px-3.5 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">맛집</span>
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-line bg-white px-3.5 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">일정</span>
	    <span class="inline-flex h-8.5 cursor-pointer items-center rounded-full border border-line bg-white px-3.5 text-13 font-semibold text-muted transition hover:border-muted hover:text-ink">기타</span>
	    
		<!-- overflow-hidden 제거 → rounded-full만 유지 -->
		<div class="ml-auto flex h-9 items-center rounded-full border border-line bg-white transition focus-within:border-brand">
		
		  <div class="relative flex h-full items-center border-r border-line" id="searchTypeWrapper">
		    <input type="hidden" name="searchType" id="searchTypeValue" value="title_content" />
		
		    <!-- rounded-l-full 추가: 왼쪽 끝 pill 모양 -->
		    <button type="button"
		            class="flex h-full items-center gap-1.5 rounded-l-full bg-transparent pl-3.5 pr-7 text-13 text-muted whitespace-nowrap hover:bg-sunk"
		            id="searchTypeBtn"
		            onclick="toggleSearchType()">
		      <span id="searchTypeLabel">제목+내용</span>
		    </button>
		
		    <svg class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-faint"
		         id="searchTypeArrow"
		         width="10" height="10" viewBox="0 0 10 10"
		         fill="none" stroke="currentColor" stroke-width="1.8">
		      <path d="M1.5 3.5l3.5 3.5 3.5-3.5"/>
		    </svg>
		
		    <ul id="searchTypeMenu"
		        class="absolute left-0 top-full z-50 mt-1.5 hidden min-w-max overflow-hidden rounded-xl border border-line bg-white py-1 shadow-lg">
		      <li data-value="title_content" data-label="제목+내용"
		          class="search-type-item cursor-pointer whitespace-nowrap px-4 py-2 text-13 text-ink hover:bg-sunk">제목+내용</li>
		      <li data-value="title" data-label="제목"
		          class="search-type-item cursor-pointer whitespace-nowrap px-4 py-2 text-13 text-ink hover:bg-sunk">제목</li>
		      <li data-value="content" data-label="내용"
		          class="search-type-item cursor-pointer whitespace-nowrap px-4 py-2 text-13 text-ink hover:bg-sunk">내용</li>
		      <li data-value="writer" data-label="작성자"
		          class="search-type-item cursor-pointer whitespace-nowrap px-4 py-2 text-13 text-ink hover:bg-sunk">작성자</li>
		    </ul>
		  </div>
		
		  <div class="relative flex h-full items-center">
		    <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-faint"
		         width="16" height="16" viewBox="0 0 18 18"
		         fill="none" stroke="currentColor" stroke-width="1.6">
		      <circle cx="8" cy="8" r="5.5"/>
		      <path d="M12.5 12.5L16 16"/>
		    </svg>
		    <!-- rounded-r-full 추가: 오른쪽 끝 pill 모양 -->
		    <input class="h-full w-40 rounded-r-full bg-transparent pl-9 pr-3 text-13 outline-none placeholder:text-faint"
		           placeholder="검색어 입력" name="keyword" />
		  </div>
		
		</div>
	  </div>
	
	  <div class="grid grid-cols-qarow gap-4 px-2 pb-3 pt-3 text-13 font-bold text-muted">
	    <span>제목</span><span>작성자</span><span>작성일</span><span class="text-right">조회</span>
	  </div>
	  <div>
	    <a href="detail" th:each="q:${qList}" class="grid grid-cols-qarow items-center gap-4 border-b border-line px-2 py-4 transition hover:bg-sunk">
	      <span class="text-15 font-semibold"><span class="mr-1.5 text-13 font-bold text-brand" th:text="|[${q.category}]|"></span>[[${q.title}]]<span class="ml-2 text-13 font-bold text-faint">· 댓글 ~</span></span>
	      <span class="text-13 text-muted">[[${q.writer}]]</span>
	      <span class="text-13 text-muted tabular-nums">[[${q.createDate}]]</span>
	      <span class="text-right text-13 text-muted tabular-nums">[[${q.count}]]</span>
	    </a>
   	  </div>
	
	  <div class="flex justify-center gap-1 py-6">
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">‹</a>
	    <span class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg bg-brand px-2 text-sm font-medium text-white">1</span>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">2</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">3</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">4</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">5</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">6</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">7</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">8</a>
	    <a href="#" class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg px-2 text-sm font-medium text-muted hover:bg-sunk hover:text-ink">›</a>
	  </div>
	</main>

	<!-- 페이지 하단 또는 <script> 위치에 추가 -->
	<script>
	  function toggleSearchType() {
	    const menu = document.getElementById('searchTypeMenu');
	    const arrow = document.getElementById('searchTypeArrow');
	    const isHidden = menu.classList.contains('hidden');
	
	    menu.classList.toggle('hidden', !isHidden);
	    // 화살표 방향 전환 (▼ ↔ ▲)
	    arrow.style.transform = isHidden
	      ? 'translateY(-50%) rotate(180deg)'
	      : 'translateY(-50%) rotate(0deg)';
	  }
	
	  // 항목 클릭 → 값 반영
	  document.querySelectorAll('.search-type-item').forEach(item => {
	    item.addEventListener('click', () => {
	      document.getElementById('searchTypeLabel').textContent = item.dataset.label;
	      document.getElementById('searchTypeValue').value = item.dataset.value;
	
	      // 선택된 항목 강조 (brand 색상)
	      document.querySelectorAll('.search-type-item').forEach(i =>
	        i.classList.remove('text-brand', 'font-semibold')
	      );
	      item.classList.add('text-brand', 'font-semibold');
	
	      // 닫기
	      document.getElementById('searchTypeMenu').classList.add('hidden');
	      document.getElementById('searchTypeArrow').style.transform = 'translateY(-50%) rotate(0deg)';
	    });
	  });
	
	  // 외부 클릭 시 닫기
	  document.addEventListener('click', e => {
	    if (!document.getElementById('searchTypeWrapper').contains(e.target)) {
	      document.getElementById('searchTypeMenu').classList.add('hidden');
	      document.getElementById('searchTypeArrow').style.transform = 'translateY(-50%) rotate(0deg)';
	    }
	  });
	</script>
	
	<div th:replace="~{views/common/modal :: modal}"></div>
	<footer th:replace="~{views/common/footer :: footer}"></footer>
</body>
</html>
