<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head :: head}"></head>
<body>
  <div th:replace="~{views/common/navbar :: navbar}"></div>

  <!-- ════════════ MAIN ════════════ -->
  <main th:if="${!loginRequired}" class="mx-auto max-w-post px-6 pb-24 pt-12">

    <!-- ★ 브레드크럼: href 실제 경로로, 카테고리 동적으로 -->
    <div class="mb-5 text-13 text-muted">
      <a th:href="@{/qList/list}" class="hover:text-brand">질문 게시판</a>
      › <span th:text="${q.category}"></span>
    </div>

    <div class="border-b border-line pb-5">
      <div class="mb-3 flex items-center gap-2">
        <!-- ★ 카테고리 뱃지: q.category 동적으로 -->
        <span class="inline-flex h-7.5 items-center rounded-full border border-line px-3 text-13 font-medium text-muted"
              th:text="${q.category}"></span>
      </div>

      <!-- ★ 제목: q.title 동적으로 -->
      <h1 class="mb-4 text-28 font-extrabold leading-snug tracking-tight"
          th:text="${q.title}"></h1>

      <div class="flex items-center gap-2.5">

        <!-- ★ 아바타 첫글자: q.displayWriter 첫 번째 문자 -->
        <span class="flex h-9.5 w-9.5 items-center justify-center rounded-full font-bold"
              th:classappend="${q.writerStatus == 'N'} ? 'bg-gray-200 text-gray-400' : 'bg-sunk text-muted'">
          <i th:if="${q.writerStatus == 'N'}" class="ti ti-user-x" style="font-size:13px"></i>
          <th:block th:unless="${q.writerStatus == 'N'}" th:text="${#strings.substring(q.displayWriter, 0, 1)}"></th:block>
        </span>

        <div>
          <!-- ★ 작성자명: q.displayWriter 동적으로 -->
          <div class="text-sm font-bold"
               th:text="${q.displayWriter}"></div>

          <!-- ★ 날짜/조회수: span 3개로 분리 (정렬 기준점 확보) -->
          <div class="flex items-center gap-1 text-13 text-muted tabular-nums">
            <span th:text="${#dates.format(q.createDate, 'yyyy.MM.dd')}"></span>
            <span>·</span>
            <span th:text="'조회 ' + ${q.count}"></span>
          </div>

          <!-- ★ 수정일: ·는 조회 줄과 세로 정렬용 invisible spacer -->
          <div th:if="${q.modifyDate != null}"
               class="flex items-center gap-1 text-13 text-muted tabular-nums">
            <span th:text="${#dates.format(q.modifyDate, 'yyyy.MM.dd')}"></span>
            <span class="invisible">·</span>
            <span>수정됨</span>
          </div>
        </div>

        <!-- ★ 수정/삭제: 로그인한 사용자가 작성자 본인일 때만 노출 -->
        <div class="ml-auto flex gap-2 text-13 text-muted"
             th:if="${session.loginUser != null and session.loginUser.memberNo == q.memberNo}">
          <!-- 댓글이 달려있으면 수정/삭제 비활성 -->
          <th:block th:if="${replyCount > 0}">
            <span class="cursor-not-allowed opacity-40" title="댓글이 달린 글은 수정할 수 없습니다">수정</span>
            <span class="text-line">·</span>
            <span class="cursor-not-allowed opacity-40" title="댓글이 달린 글은 삭제할 수 없습니다">삭제</span>
          </th:block>
          <th:block th:unless="${replyCount > 0}">
            <a th:href="@{/qList/edit(qNo=${q.qNo})}" class="hover:text-brand">수정</a>
            <span class="text-line">·</span>
            <!-- ★ confirm() 대신 danger 모달 사용 → openDeleteModal()로 qNo 전달 -->
            <button type="button" class="hover:text-brand"
                    th:onclick="|openDeleteModal(${q.qNo})|">삭제</button>
          </th:block>
        </div>

        <!-- ★ 글 신고: 본인 글이 아닐 때만 노출 -->
        <div class="ml-auto flex gap-2 text-13 text-muted"
             th:if="${session.loginUser != null and session.loginUser.memberNo != q.memberNo}">
          <button type="button" class="hover:text-red-500"
                  th:onclick="|openReportModal('question', ${q.qNo})|">신고</button>
        </div>

      </div>
    </div>

    <!-- ★ 본문: q.content 동적으로, pre-wrap으로 줄바꿈 유지 -->
    <div class="py-6 text-base leading-loose text-ink/85"
         th:text="${q.content}"
         style="white-space: pre-wrap"></div>

    <!-- ★ 태그 영역: QList VO에 태그 필드 없음 → 추후 구현 시 활성화 -->
    <!--
    <div class="flex gap-2">
      <span class="inline-flex h-7.5 items-center rounded-full border border-line px-3 text-13 font-medium text-muted">태그1</span>
    </div>
    -->

    <!-- 추천 버튼 -->
    <div class="flex justify-center py-8">
      <button id="like-btn"
              onclick="toggleLike()"
              class="inline-flex items-center gap-2 rounded-full border-2 px-6 py-2.5 text-15 font-semibold transition"
              th:classappend="${isLiked} ? 'border-brand bg-brand text-white' : 'border-line bg-white text-muted hover:border-brand hover:text-brand'">
        <i class="far fa-thumbs-up"></i>
        <span>추천</span>
        <span id="like-count" th:text="${likeCount}">0</span>
      </button>
    </div>

    <!-- ════ 댓글 섹션 ════ -->
    <section class="mt-6">

      <!-- 댓글 수 -->
      <div class="mb-5 text-lg font-bold">
        댓글 <span id="reply-count" class="text-brand tabular-nums" th:text="${replyCount}">0</span>
      </div>

      <!-- 댓글 작성 폼 (목록 상단 고정) -->
      <div class="mb-6 border-t-2 border-ink pt-6">
        <h3 class="mb-4 text-base font-bold">댓글 작성</h3>
        <form id="reply-form">
          <input type="hidden" name="postNo"    th:value="${q.qNo}" />
          <input type="hidden" name="postBoard" value="Q" />
          <div class="overflow-hidden rounded-xl border border-line bg-white transition focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
            <textarea id="reply-content" name="content"
                      class="block min-h-composer w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none placeholder:text-faint"
                      th:readonly="${session.loginUser == null}"
                      th:classappend="${session.loginUser == null} ? 'cursor-not-allowed bg-sunk' : ''"
                      placeholder="질문에 도움이 되는 댓글을 남겨보세요"></textarea>
            <div class="flex items-center justify-between border-t border-line py-2 pl-4 pr-2">
              <span class="text-xs text-faint">서로 존중하는 댓글 문화를 만들어요</span>
              <button type="button"
                      onclick="handleReplySubmit()"
                      class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">
                댓글 등록
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- 댓글 목록 -->
      <div th:each="reply : ${replyList}"
           th:id="|reply-${reply.replyNo}|"
           class="flex gap-4 border-t border-line py-5">
        <span class="flex h-10.5 w-10.5 flex-none items-center justify-center rounded-full font-bold"
              th:classappend="${reply.writerStatus == 'N'} ? 'bg-gray-200 text-gray-400' : 'bg-sunk text-muted'">
          <i th:if="${reply.writerStatus == 'N'}" class="ti ti-user-x" style="font-size:14px"></i>
          <th:block th:unless="${reply.writerStatus == 'N'}" th:text="${#strings.substring(reply.displayWriter, 0, 1)}"></th:block>
        </span>
        <div class="flex-1">
          <div class="mb-1.5 flex items-center gap-2">
            <span class="text-sm font-bold"
                  th:text="${reply.displayWriter}"></span>
            <span class="text-xs text-faint tabular-nums"
                  th:text="${#dates.format(reply.createDate, 'yyyy.MM.dd')}"></span>
            <span th:if="${session.loginUser != null and session.loginUser.memberNo == reply.memberNo}"
                  class="ml-auto flex gap-2.5 text-xs text-muted">
              <button type="button" class="hover:text-brand"
                      th:onclick="|toggleReplyEdit(${reply.replyNo})|">수정</button>
              <button type="button" class="hover:text-red-500"
                      th:onclick="|openReplyDeleteModal(${reply.replyNo}, ${q.qNo})|">삭제</button>
            </span>

            <!-- ★ 댓글 신고: 본인 댓글이 아닐 때만 노출 -->
            <span th:if="${session.loginUser != null and session.loginUser.memberNo != reply.memberNo}"
                  class="ml-auto flex gap-2.5 text-xs text-muted">
              <button type="button" class="hover:text-red-500"
                      th:onclick="|openReportModal('reply', ${reply.replyNo})|">신고</button>
            </span>
          </div>
          <!-- 댓글 본문 -->
          <p th:id="|reply-text-${reply.replyNo}|"
             class="text-15 leading-relaxed text-ink/85"
             th:text="${reply.content}"></p>
          <!-- 인라인 수정 폼 (기본 숨김) -->
          <form th:id="|reply-edit-form-${reply.replyNo}|"
                class="hidden mt-2">
            <input type="hidden" name="replyNo"   th:value="${reply.replyNo}" />
            <input type="hidden" name="postNo"    th:value="${q.qNo}" />
            <input type="hidden" name="postBoard" value="Q" />
            <div class="overflow-hidden rounded-xl border border-line bg-white transition focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
              <textarea name="content"
                        th:id="|reply-edit-ta-${reply.replyNo}|"
                        class="block min-h-[80px] w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none"
                        th:text="${reply.content}"></textarea>
              <div class="flex justify-end gap-2 border-t border-line py-2 pr-2">
                <button type="button"
                        class="inline-flex h-9 items-center rounded-lg border border-line px-4 text-sm text-muted hover:bg-sunk"
                        th:onclick="|cancelReplyEdit(${reply.replyNo})|">취소</button>
                <button type="button"
                        th:onclick="|submitReplyEdit(${reply.replyNo})|"
                        class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">저장</button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </section>
  </main>

  <!-- ★ 삭제용 hidden form: GET 링크 대신 POST로 qNo 전송 → CSRF·URL 직접 접근 차단 -->
  <form id="delete-form" th:action="@{/qList/delete}" method="post" style="display:none">
    <input type="hidden" id="delete-qNo" name="qNo" />
  </form>


  <!-- 신고 모달 -->
  <div id="modal-report" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40">
    <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
      <h2 class="mb-4 text-lg font-bold">신고하기</h2>
      <p class="mb-3 text-sm text-muted">신고 사유를 선택해주세요.</p>
      <select id="report-reason"
              class="mb-5 w-full rounded-lg border border-line px-3 py-2 text-sm outline-none focus:border-brand">
        <option value="">-- 사유 선택 --</option>
        <option value="A">광고</option>
        <option value="B">욕설</option>
        <option value="C">음란</option>
        <option value="D">도배</option>
      </select>
      <div class="flex justify-end gap-2">
        <button type="button" onclick="closeReportModal()"
                class="inline-flex h-9 items-center rounded-lg border border-line px-4 text-sm text-muted hover:bg-sunk">취소</button>
        <button type="button" onclick="submitReport()"
                class="inline-flex h-9 items-center rounded-lg bg-red-500 px-4 text-sm font-semibold text-white hover:bg-red-600">신고</button>
      </div>
    </div>
  </div>

  <!-- 비로그인 + MEMBER 공개글 → 모달 트리거 -->
  <script th:inline="javascript">
    window.addEventListener('DOMContentLoaded', function () {
      const loginRequired = /*[[${loginRequired}]]*/ false;
      const errorMessage  = /*[[${errorMessage}]]*/ null;
      if (loginRequired) {
        openInfoModal(
          '회원 전용 글입니다',
          '로그인 후 이용하실 수 있어요.'
        );
        // 확인 버튼 → 목록으로 이동
        document.querySelector('#modal-info button').onclick = function () {
          location.href = '/qList/list';
        };
      } else if (errorMessage) {
        // delete/edit/update 실패 시 컨트롤러가 redirect로 넘긴 알림
        openInfoModal('알림', errorMessage);
      }
    });

    // danger 모달 열기 → 확인 시 hidden form POST 제출
    function openDeleteModal(qNo) {
      openDangerModal(
        '질문을 삭제할까요?',
        '삭제한 글은 되돌릴 수 없어요.',
        function () {
          document.getElementById('delete-qNo').value = qNo;
          document.getElementById('delete-form').submit();
        }
      );
    }

    const replyLoginRequired = /*[[${session.loginUser == null}]]*/ true;

    function handleReplySubmit() {
      if (replyLoginRequired) {
        openInfoModal('로그인이 필요합니다', '로그인 후 댓글을 작성할 수 있어요.');
        return;
      }
      submitReplyInsert();
    }

    function submitReplyInsert() {
      const content = document.getElementById('reply-content').value.trim();
      if (!content) { openInfoModal('알림', '댓글 내용을 입력해주세요.'); return; }

      fetch('/reply/ajax/insert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: JSON.stringify({ content: content, postNo: qNo, postBoard: 'Q' })
      })
      .then(r => r.json())
      .then(data => {
        if (!data.success) { openInfoModal('알림', data.message); return; }
        document.getElementById('reply-content').value = '';
        const countEl = document.getElementById('reply-count');
        countEl.textContent = parseInt(countEl.textContent) + 1;
        appendReplyDOM(data);
      });
    }

    function appendReplyDOM(d) {
      document.querySelector('section').insertAdjacentHTML('beforeend', `
        <div id="reply-${d.replyNo}" class="flex gap-4 border-t border-line py-5">
          <span class="flex h-10.5 w-10.5 flex-none items-center justify-center rounded-full font-bold ${d.writer && !d.writer.startsWith('(') ? 'bg-sunk text-muted' : 'bg-gray-200 text-gray-400'}">
            ${d.writer && !d.writer.startsWith('(') ? d.writer.charAt(0) : '<i class=\"ti ti-user-x\" style=\"font-size:14px\"></i>'}
          </span>
          <div class="flex-1">
            <div class="mb-1.5 flex items-center gap-2">
              <span class="text-sm font-bold">${d.writer && !d.writer.startsWith('(') ? d.writer : '(탈퇴회원)'}</span>
              <span class="text-xs text-faint tabular-nums">${d.createDate}</span>
              <span class="ml-auto flex gap-2.5 text-xs text-muted">
                <button type="button" class="hover:text-brand"
                        onclick="toggleReplyEdit(${d.replyNo})">수정</button>
                <button type="button" class="hover:text-red-500"
                        onclick="openReplyDeleteModal(${d.replyNo}, ${qNo})">삭제</button>
              </span>
            </div>
            <p id="reply-text-${d.replyNo}" class="text-15 leading-relaxed text-ink/85">${d.content}</p>
            <form id="reply-edit-form-${d.replyNo}" class="hidden mt-2">
              <div class="overflow-hidden rounded-xl border border-line bg-white transition focus-within:border-brand focus-within:ring-4 focus-within:ring-brand-soft">
                <textarea id="reply-edit-ta-${d.replyNo}"
                          class="block min-h-[80px] w-full resize-none border-none bg-transparent px-4 py-3 text-sm leading-relaxed outline-none">${d.content}</textarea>
                <div class="flex justify-end gap-2 border-t border-line py-2 pr-2">
                  <button type="button" class="inline-flex h-9 items-center rounded-lg border border-line px-4 text-sm text-muted hover:bg-sunk"
                          onclick="cancelReplyEdit(${d.replyNo})">취소</button>
                  <button type="button" class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink"
                          onclick="submitReplyEdit(${d.replyNo})">저장</button>
                </div>
              </div>
            </form>
          </div>
        </div>`);
    }

    function toggleReplyEdit(replyNo) {
      document.getElementById('reply-text-' + replyNo).classList.toggle('hidden');
      document.getElementById('reply-edit-form-' + replyNo).classList.toggle('hidden');
    }

    function cancelReplyEdit(replyNo) {
      document.getElementById('reply-text-' + replyNo).classList.remove('hidden');
      document.getElementById('reply-edit-form-' + replyNo).classList.add('hidden');
    }

    function openReplyDeleteModal(replyNo, postNo) {
      openDangerModal(
        '댓글을 삭제할까요?',
        '삭제한 댓글은 되돌릴 수 없어요.',
        function () {
          fetch('/reply/ajax/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ replyNo: replyNo })
          })
          .then(r => r.json())
          .then(data => {
            if (!data.success) { openInfoModal('알림', data.message); return; }
            document.getElementById('reply-' + replyNo)?.remove();
            const countEl = document.getElementById('reply-count');
            countEl.textContent = parseInt(countEl.textContent) - 1;
          });
        }
      );
    }

    function submitReplyEdit(replyNo) {
      const ta = document.getElementById('reply-edit-ta-' + replyNo);
      if (!ta.value.trim()) { openInfoModal('알림', '댓글 내용을 입력해주세요.'); return; }

      fetch('/reply/ajax/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: JSON.stringify({ replyNo: replyNo, content: ta.value.trim() })
      })
      .then(r => r.json())
      .then(data => {
        if (!data.success) { openInfoModal('알림', data.message); return; }
        document.getElementById('reply-text-' + replyNo).textContent = ta.value.trim();
        cancelReplyEdit(replyNo);
      });
    }

    // ─── 신고 모달 ───────────────────────────────────────────
    let reportTargetType = null;
    let reportTargetNo   = null;

    function openReportModal(targetType, targetNo) {
      reportTargetType = targetType;
      reportTargetNo   = targetNo;
      document.getElementById('report-reason').value = '';
      const modal = document.getElementById('modal-report');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeReportModal() {
      const modal = document.getElementById('modal-report');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function submitReport() {
      const reason = document.getElementById('report-reason').value;
      if (!reason) {
        openInfoModal('알림', '신고 사유를 선택해주세요.');
        return;
      }
      fetch('/report/insert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'targetType=' + reportTargetType
            + '&targetNo='  + reportTargetNo
            + '&reason='    + encodeURIComponent(reason)
      })
      .then(r => r.json())
      .then(data => {
        closeReportModal();
        openInfoModal(data.status === 'success' ? '신고 완료' : '알림', data.message);
      });
    }

    // ─── 추천 toggle ─────────────────────────────────────────────
    const qNo        = /*[[${q.qNo}]]*/ 0;
    const isLoggedIn = /*[[${session.loginUser != null}]]*/ false;

    function toggleLike() {
      if (!isLoggedIn) {
        openInfoModal('로그인이 필요합니다', '추천은 로그인 후 이용하실 수 있어요.');
        return;
      }
      fetch('/qList/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'qNo=' + qNo
      })
      .then(res => res.json())
      .then(data => {
        if (!data.success) return;
        const btn   = document.getElementById('like-btn');
        const count = document.getElementById('like-count');
        count.textContent = data.count;
        if (data.liked) {
          btn.classList.remove('border-line', 'bg-white', 'text-muted', 'hover:border-brand', 'hover:text-brand');
          btn.classList.add('border-brand', 'bg-brand', 'text-white');
        } else {
          btn.classList.remove('border-brand', 'bg-brand', 'text-white');
          btn.classList.add('border-line', 'bg-white', 'text-muted', 'hover:border-brand', 'hover:text-brand');
        }
      });
    }
  </script>

  <div th:replace="~{views/common/modal :: modal}"></div>
  <th:block th:if="${!loginRequired}">
    <footer th:replace="~{views/common/footer :: footer}"></footer>
  </th:block>
</body>
</html>
