<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
    /* 전체 배경 설정 */
    body {
        background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 20px;
    }

    /* 좌우 분할 박스 */
    .join-wrapper {
       display: flex;
    width: 900px;
    max-width: 100%;
    background-color: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    /* 그림자를 더 진하게 해서 폼을 띄워 보이게 함 */
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    /* 왼쪽 이미지 영역 */
    .join-image {
        width: 50%;
        background-color: #eaeaea;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .join-image img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* 이미지 전체를 잘림 없이 보여줌 */
        padding: 20px;
    }

    /* 오른쪽 폼 영역 */
    .join-form-area {
        width: 50%;
    padding: 50px;
    }

    /* 모바일 대응 */
    @media (max-width: 768px) {
        .join-wrapper { flex-direction: column; }
        .join-image, .join-form-area { width: 100%; }
        .join-image { height: 200px; }
    }


.container {
    background-color: rgba(255, 255, 255, 0.9); /* 폼 뒤에 반투명한 흰색 배경 */
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
    
        .container {
            max-width: 500px;
            margin-top: 50px;
        }
        #addStopModal {
        display: none !important;
    }

        /* 테일윈드 모달 스타일을 부트스트랩 환경에 맞게 강제 추출/이식 */
        #dim-background {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.5); /* bg-slate-900/50 */
            display: flex; align-items: center; justify-content: center; padding: 1.25rem;
            z-index: 9999;
        }
        #dim-background.hidden, #modal-info.hidden, #modal-confirm.hidden, #modal-danger.hidden {
            display: none !important;
        }
        .w-96 { width: 24rem; }
        .max-w-full { max-width: 100%; }
        .overflow-hidden { overflow: hidden; }
        .rounded-2xl { border-radius: 1rem; }
        .bg-white { background-color: #ffffff; }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .text-center { text-align: center; }
        .px-7 { padding-left: 1.75rem; padding-right: 1.75rem; }
        .pb-6 { padding-bottom: 1.5rem; }
        .pt-7 { padding-top: 1.75rem; }
        .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
        .pb-5 { padding-bottom: 1.25rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .mb-3\.5 { margin-bottom: 0.875rem; }
        .mb-1\.5 { margin-bottom: 0.375rem; }
        .flex { display: flex; }
        .h-12 { height: 3rem; }
        .w-12 { width: 3rem; }
        .items-center { align-items: center; }
        .justify-content-center, .justify-center { justify-content: center; }
        .rounded-full { border-radius: 9999px; }
        .bg-indigo-50 { background-color: #eef2ff; }
        .text-indigo-600 { color: #4f46e5; }
        .h-5 { height: 1.25rem; }
        .w-5 { width: 1.25rem; }
        .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .font-extrabold { font-weight: 800; }
        .tracking-tight { letter-spacing: -0.025em; }
        .text-slate-900 { color: #0f172a; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .leading-relaxed { line-height: 1.625; }
        .text-slate-500 { color: #64748b; }
        .h-11 { height: 2.75rem; }
        .w-full { width: 100%; }
        .rounded-xl { border-radius: 0.75rem; }
        .bg-indigo-600 { background-color: #4f46e5; }
        .font-semibold { font-weight: 600; }
        .text-white { color: #ffffff; }
        .bg-indigo-600:hover { background-color: #4338ca; }
    </style>
</head>

<body>
    <th:block th:replace="~{views/common/modal :: modal}"></th:block>

    <div class="join-wrapper">
        <div class="join-image">
            <img th:src="@{/images/travel.jpeg}" alt="여행 이미지">
        </div>

        <div class="join-form-area">
            <h2 class="mb-4 text-center" style="font-weight: 500;">회원가입</h2>

            <form th:action="@{/member/join}" method="post">
                <label class="form-label font-weight-bold small">아이디</label>
                <div class="input-group mb-1">
                    <input type="text" name="id" id="userId" class="form-control" placeholder="아이디 입력" autocomplete="new-password">
                    <button type="button" class="btn btn-outline-primary" id="checkIdBtn">중복 확인</button>
                </div>
                <small id="idMsg" class="mb-3 d-block"></small>
                
                <input type="password" name="pwd" class="form-control mb-2" placeholder="비밀번호" autocomplete="new-password">
                <small id="pwdRuleMsg"></small>
                
                <input type="password" id="pwdCheck" class="form-control mb-1" placeholder="비밀번호 확인" autocomplete="new-password">
                <small id="pwdMsg"></small>

                <input type="text" name="nickname" class="form-control mb-2" placeholder="닉네임">

                <div class="input-group mb-2">
                    <input type="text" id="emailId" class="form-control" placeholder="이메일 아이디">
                    <span class="input-group-text">@</span>
                    <select id="emailDomain" class="form-select">
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                    <button type="button" class="btn btn-outline-primary" id="sendCodeBtn">인증</button>
                </div>

                <div class="input-group mb-2" id="authArea" style="display:none;">
                    <input type="text" id="authCode" class="form-control" placeholder="인증번호">
                    <button type="button" class="btn btn-outline-success" id="verifyBtn">확인</button>
                </div>

                <small id="emailMsg" class="mb-2 d-block"></small>

                <input type="text" name="phone" class="form-control mb-3" placeholder="전화번호">
                <input type="hidden" name="email" id="fullEmail">

                <button type="submit" class="btn btn-primary w-100">회원가입</button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>

    <script>
        $(document).ready(function() {
            // 비밀번호 실시간 검증 초기화
            initPasswordValidation("input[name='pwd']", "#pwdCheck", "#pwdRuleMsg", "#pwdMsg");
            
            let isIdChecked = false;
            let checkedId = "";

            // 중복 확인 버튼 클릭 이벤트
            $("#checkIdBtn").click(function() {
                let id = $("#userId").val().trim();
                let $idMsg = $("#idMsg");
                
                if(id === "") {
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "아이디를 입력해 주세요.");
                    $idMsg.text("아이디를 입력해 주세요.").css("color", "red");
                    return;
                }
                
                let idReg = /^[a-zA-Z0-9]{4,12}$/;
                if(!idReg.test(id)) {
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "아이디는 영문 및 숫자 4~12자리로 입력하세요.");
                    $idMsg.text("아이디는 영문 및 숫자 4~12자리로 입력하세요.").css("color", "red");
                    return;
                }

                $.get("/member/check-id", { id: id }, function(res) {
                    if(res === "AVAILABLE") {
                        if (typeof openInfoModal === 'function') openInfoModal("성공", "사용 가능한 아이디입니다.");
                        $idMsg.text("사용 가능한 아이디입니다.").css("color", "green");
                        isIdChecked = true;
                        checkedId = id;
                    } else {
                        if (typeof openInfoModal === 'function') openInfoModal("경고", "이미 사용중인 아이디입니다.");
                        $idMsg.text("이미 사용중인 아이디입니다.").css("color", "red");
                        isIdChecked = false;
                        checkedId = "";
                    }
                });
            });

            // 아이디 수정 시 중복 확인 초기화
            $("#userId").on("input", function() {
                if(isIdChecked && $(this).val().trim() !== checkedId) {
                    isIdChecked = false;
                    checkedId = "";
                    $("#idMsg").text("아이디가 변경되었습니다. 다시 중복 확인을 해주세요.").css("color", "orange");
                }
            });
            
            // 이메일 인증 초기화
            initEmailVerification({
                sendBtn: "#sendCodeBtn",
                verifyBtn: "#verifyBtn",
                authArea: "#authArea",
                emailMsg: "#emailMsg",
                authCodeInput: "#authCode",
                getEmailFunction: function() {
                    return $("#emailId").val() + "@" + $("#emailDomain").val();
                }
            });
            
            let certifiedEmail = "";

            $("#emailId, #emailDomain").on("input change", function () {
                let currentEmail = $("#emailId").val() + "@" + $("#emailDomain").val();
                let isVerified = sessionStorage.getItem("emailVerified");

                if (isVerified !== "true") {
                    $("#emailMsg").text("");
                    return;
                }

                if (isVerified === "true" && certifiedEmail === "") {
                    certifiedEmail = currentEmail;
                }

                if (isVerified === "true" && currentEmail !== certifiedEmail) {
                    sessionStorage.setItem("emailVerified", "false");
                    $("#emailMsg").text("이메일이 변경되어 인증이 초기화되었습니다.").css("color", "red");
                }
                else if (currentEmail === certifiedEmail) {
                    sessionStorage.setItem("emailVerified", "true");
                    $("#emailMsg").text("이메일 인증이 완료되었습니다.").css("color", "green");
                }
            });

            // submit 제어
            $("form").submit(function (e) {
                e.preventDefault();

                let id = $("input[name='id']").val().trim();
                if(id === ""){ 
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "아이디를 입력하세요.");
                    return;
                }
                
                if(!isIdChecked || $("#userId").val().trim() !== checkedId) {
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "아이디 중복 확인이 필요합니다.");
                    return;
                }
                
                let pwd = $("input[name='pwd']").val();
                let pwdCheck = $("#pwdCheck").val();
                let reg = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()~_+=\{\}\[\]| \-])[A-Za-z\d!@#$%^&*()~_+=\{\}\[\]| \-]{8,20}$/;
                
                if(!reg.test(pwd)){ 
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "비밀번호 형식을 확인해주세요."); 
                    return; 
                }
                if (pwd !== pwdCheck) { 
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "비밀번호가 일치하지 않습니다."); 
                    return; 
                }

                if (sessionStorage.getItem("emailVerified") !== "true") { 
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "이메일 인증이 필요합니다."); 
                    return; 
                }

                let nickname = $("input[name='nickname']").val().trim();
                if(nickname === ""){ 
                    if (typeof openInfoModal === 'function') openInfoModal("알림", "닉네임을 입력하세요."); 
                    return; 
                }

                let combinedEmail = $("#emailId").val() + "@" + $("#emailDomain").val();
                $("#fullEmail").val(combinedEmail);

                let formData = $(this).serialize();
                
                $.ajax({
                    url: "/member/join",
                    type: "POST",
                    data: formData,
                    success: function(res){
                        if(res === "SUCCESS"){
                            if (typeof openInfoModal === 'function') openInfoModal("성공", "회원가입이 완료되었습니다.");
                            setTimeout(function() {
                                location.href = "/member/login";
                            }, 1500);
                        } else if(res === "EMAIL_NOT_VERIFIED"){
                            if (typeof openInfoModal === 'function') openInfoModal("오류", "이메일 인증이 올바르지 않거나 변경되었습니다.");
                        } else if(res === "DUPLICATE_EMAIL"){
                            if (typeof openInfoModal === 'function') openInfoModal("오류", "이미 가입된 이메일입니다.");
                        } else if(res === "DUPLICATE_nickname"){
                            if (typeof openInfoModal === 'function') openInfoModal("오류", "이미 존재하는 닉네임입니다.");    
                        } else {
                            if (typeof openInfoModal === 'function') openInfoModal("오류", "회원가입에 실패했습니다.");
                        }
                    },
                    error: function() {
                        if (typeof openInfoModal === 'function') openInfoModal("오류", "서버 통신 중 오류가 발생했습니다.");
                    }
                });
            }); 
        }); 
    </script>
</body>
</html>
